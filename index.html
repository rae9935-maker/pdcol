<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판례 검색기</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* 업로드된 한국어 대응 구글 정적 폰트 패키지를 웹 UI 전체에 다이내믹 바인딩 */
        @font-face {
            font-family: 'Noto Sans KR Custom';
            src: url('./NotoSansKR-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Sans KR Custom';
            src: url('./NotoSansKR-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR Custom', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            color: #202124;
        }
        
        .search-container {
            text-align: center;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-top: -20px;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .oc-container {
            margin-bottom: 15px;
            text-align: right;
        }
        .oc-input {
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }
        .oc-input:focus {
            border-color: #1a73e8;
        }

        .search-box-wrapper {
            position: relative;
            width: 100%;
        }
        .search-box {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 28px;
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
        }
        .search-box:focus, .search-box:hover {
            box-shadow: 0 2px 8px rgba(32, 33, 36, 0.15);
            border-color: rgba(0,0,0,0);
        }
        .btn-container {
            margin-top: 20px;
        }
        button {
            background-color: #f1f3f4;
            border: 1px solid #f1f3f4;
            border-radius: 24px;
            color: #3c4043;
            font-size: 14px;
            font-weight: 500;
            margin: 8px 6px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.15s;
        }
        button:hover {
            background-color: #e8eaed;
            border-color: #dadce0;
            color: #202124;
        }
        
        button.btn-raw {
            background-color: #e8f0fe;
            border-color: #d2e3fc;
            color: #1967d2;
        }
        button.btn-raw:hover {
            background-color: #d2e3fc;
            border-color: #1a73e8;
            color: #1a73e8;
        }
        
        .log-wrapper {
            margin-top: 25px;
            text-align: left;
            display: none;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .log-title {
            font-size: 12px;
            font-weight: bold;
            color: #5f6368;
        }
        .copy-btn {
            margin: 0;
            padding: 5px 12px;
            font-size: 11px;
            background-color: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 6px;
            color: #1a73e8;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }
        .copy-btn:hover {
            background-color: #f8f9fa;
            border-color: #1a73e8;
        }

        .log-box {
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #e8eaed;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            color: #3c4043;
            max-height: 220px;
            overflow-y: auto;
        }
        .log-line {
            margin: 4px 0;
            line-height: 1.4;
            word-break: break-all;
        }
        .log-success { color: #137333; font-weight: bold; }
        .log-error { color: #c5221f; font-weight: bold; }
        .log-info { color: #1a73e8; }
        .log-warn { color: #b06000; font-weight: bold; }

        .info-text {
            margin-top: 35px;
            font-size: 12px;
            color: #70757a;
            line-height: 1.6;
            border-top: 1px solid #f1f3f4;
            padding-top: 15px;
        }

        #toast {
            display: none;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #323232;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 99999;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<div class="search-container">
    <div class="main-title">판례 검색기</div>
    
    <div class="oc-container">
        <input type="password" id="ocInput" class="oc-input" placeholder="법제처 인증키(oc) 입력 후 엔터" onchange="saveOCKey()">
    </div>

    <div class="search-box-wrapper">
        <input type="text" id="searchInput" class="search-box" placeholder="아무 대화 내용이나 판결문 본문을 그대로 붙여넣으세요" autocomplete="off">
    </div>
    
    <div class="btn-container">
        <button onclick="handleDownload('txt')">TXT 파일 다운로드</button>
        <button onclick="handleDownload('pdf')">PDF 파일 다운로드</button>
        <button class="btn-raw" onclick="handleDownload('raw')">파싱 데이터 가져오기</button>
    </div>
    
    <div id="logWrapper" class="log-wrapper">
        <div class="log-header">
            <span class="log-title">실시간 구동 로그</span>
            <button class="copy-btn" onclick="copyLog()">로그 복사</button>
        </div>
        <div id="logBox" class="log-box"></div>
    </div>

    <div class="info-text">
        ※ 임의의 텍스트 속에서 법원 사건번호 양식을 자동으로 똑똑하게 인식하여 리스트화합니다.<br>
        오른쪽 상단에 인증키(oc)를 입력해 두시면 현재 탭 세션 동안 임시 저장됩니다. (페이지를 완전히 닫으면 삭제)
    </div>
</div>

<div id="toast"></div>

<script>
    window.onerror = function(msg, url, lineNo) {
        addLog("시스템 예외 감지: " + msg + " (Line: " + lineNo + ")", "error");
        return false;
    };

    function showToast(message) {
        var toast = document.getElementById("toast");
        toast.innerText = message;
        toast.style.display = "block";
        setTimeout(function() {
            toast.style.display = "none";
        }, 3000);
    }

    var proxyHealth = {
        "https://corsproxy.io/?": { fails: 0, lastFail: 0 },
        "https://api.codetabs.com/v1/proxy?url=": { fails: 0, lastFail: 0 },
        "https://api.allorigins.win/raw?url=": { fails: 0, lastFail: 0 }
    };
    window.lastSuccessfulProxy = sessionStorage.getItem('last_working_proxy') || "";

    window.onload = function() {
        try {
            if (localStorage.getItem('law_api_oc')) {
                localStorage.removeItem('law_api_oc');
            }
            
            var savedOC = sessionStorage.getItem('law_api_oc');
            if (savedOC) {
                document.getElementById('ocInput').value = savedOC;
            }
            
            window.caseDataCache = {};
        } catch (e) {}
    };

    function saveOCKey() {
        var ocValue = document.getElementById('ocInput').value.trim();
        try {
            sessionStorage.setItem('law_api_oc', ocValue);
            showToast("인증키가 현재 세션에 임시 저장되었습니다. (창을 닫으면 자동 소멸)");
        } catch (e) {}
    }

    function clearLog() {
        var logBox = document.getElementById('logBox');
        var logWrapper = document.getElementById('logWrapper');
        logBox.innerHTML = '';
        logWrapper.style.display = 'block';
    }

    function addLog(message, type) {
        if (!type) type = 'info';
        var logBox = document.getElementById('logBox');
        var line = document.createElement('div');
        line.className = 'log-line log-' + type;
        var timestamp = new Date().toLocaleTimeString();
        line.innerText = '[' + timestamp + '] ' + message;
        logBox.appendChild(line);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function copyLog() {
        var logBox = document.getElementById('logBox');
        if (!logBox) return;
        var logText = logBox.innerText;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(logText).then(function() {
                showToast("로그가 클립보드에 복사되었습니다!");
            }).catch(function() {
                fallbackCopy(logText);
            });
        } else {
            fallbackCopy(logText);
        }
    }

    function fallbackCopy(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            showToast("로그가 클립보드에 복사되었습니다!");
        } catch (err) {
            showToast("복사에 실패했습니다. 직접 선택하여 복사해 주세요.");
        }
        document.body.removeChild(textarea);
    }

    function extractCaseNumbers(text) {
        if (!text) return [];
        
        var caseRegex = /\d{2,4}\s*[가-힣]{1,3}\s*\d+/g;
        var matches = text.match(caseRegex) || [];
        
        var cleanedMatches = matches.map(function(item) {
            return item.replace(/\s+/g, ""); 
        });
        
        return cleanedMatches.filter(function(item, pos) {
            return cleanedMatches.indexOf(item) === pos;
        });
    }

    function getSmartOrderedProxies() {
        var proxies = [
            "https://corsproxy.io/?",
            "https://api.codetabs.com/v1/proxy?url=",
            "https://api.allorigins.win/raw?url="
        ];
        
        var now = Date.now();
        
        proxies.sort(function(a, b) {
            var hA = proxyHealth[a];
            var hB = proxyHealth[b];
            
            var penaltyA = (hA.fails > 0 && (now - hA.lastFail < 45000)) ? hA.fails : 0;
            var penaltyB = (hB.fails > 0 && (now - hB.lastFail < 45000)) ? hB.fails : 0;
            
            if (penaltyA !== penaltyB) {
                return penaltyA - penaltyB;
            }
            
            if (a === window.lastSuccessfulProxy) return -1;
            if (b === window.lastSuccessfulProxy) return 1;
            return Math.random() - 0.5;
        });

        return proxies;
    }

    async function fetchWithFallback(targetUrl, caseNum) {
        var activeProxies = getSmartOrderedProxies();

        for (var i = 0; i < activeProxies.length; i++) {
            if (i > 0) {
                await new Promise(function(resolve) { setTimeout(resolve, 300); });
            }

            var currentProxy = activeProxies[i];
            var proxyName = currentProxy.includes("corsproxy") ? "고속망" : currentProxy.includes("codetabs") ? "기본망" : "비상망";
            
            try {
                var finalUrl = currentProxy + encodeURIComponent(targetUrl);
                var controller = new AbortController();
                
                var timeoutDuration = (i === 0) ? 3000 : 4500;
                var id = setTimeout(function() { controller.abort(); }, timeoutDuration); 
                
                var res = await fetch(finalUrl, { signal: controller.signal });
                clearTimeout(id);
                if (res.ok) {
                    proxyHealth[currentProxy].fails = 0; 
                    window.lastSuccessfulProxy = currentProxy;
                    sessionStorage.setItem('last_working_proxy', currentProxy);
                    return res;
                }
                throw new Error("HTTP Status " + res.status);
            } catch (e) {
                proxyHealth[currentProxy].fails++;
                proxyHealth[currentProxy].lastFail = Date.now();
                
                if (currentProxy === window.lastSuccessfulProxy) {
                    window.lastSuccessfulProxy = "";
                    sessionStorage.removeItem('last_working_proxy');
                }
                addLog("⚠️ [" + caseNum + "] " + proxyName + " 장애 또는 지연 감지. 대체 회선으로 우회 처리합니다.", "warn");
            }
        }
        throw { type: "NETWORK_ERROR", message: "모든 CORS 우회 통신망이 일시적으로 차단되었거나 타임아웃 정체 상태입니다." };
    }

    function getXmlTagValue(text, tagName) {
        try {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(text, "text/xml");
            if (!xmlDoc.getElementsByTagName("parsererror").length) {
                var element = xmlDoc.getElementsByTagName(tagName)[0];
                if (element) return element.textContent.trim();
            }
        } catch (e) {}
        
        var regex = new RegExp("<" + tagName + "[^>]*>([\\s\\S]*?)<\/" + tagName + ">", "i");
        var match = text.match(regex);
        if (match && match[1]) {
            return match[1].replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1").trim();
        }
        return "";
    }

    function getCoreCaseNumber(str) {
        if (!str) return "";
        var normalized = str.replace(/\s+/g, "");
        var matchesNorm = normalized.match(/\d{2,4}[가-힣]{1,3}\d+/);
        return matchesNorm ? matchesNorm[0] : normalized.replace(/[^가-힣0-9]/g, "");
    }

    // ==========================================
    // [거시적 구조 분석 파싱 코어 모듈]
    // ==========================================
    
    // 1단계: 라인 단위 성격 분석을 통한 거시 블록 구조화 (Block Tokenization)
    function parseTextToStructures(text) {
        if (!text) return [];
        var lines = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').split('\n');
        var structures = [];
        var currentParagraphLines = [];
        
        function flushParagraph() {
            if (currentParagraphLines.length === 0) return;
            var paraText = currentParagraphLines.join(' ').replace(/\s+/g, ' ').trim();
            if (paraText) {
                structures.push({ type: 'paragraph', text: paraText });
            }
            currentParagraphLines = [];
        }
        
        for (var i = 0; i < lines.length; i++) {
            var line = lines[i].trim();
            if (!line) {
                flushParagraph();
                continue;
            }
            
            // 법원 정식 상위 대목차 구조 판단 조건식 선언
            var isHeading = /^【.*】$/.test(line) || 
                            /^\[.*\]$/.test(line) || 
                            /^\d+\.\s+/.test(line) || 
                            /^[가-하]\.\s+/.test(line) ||
                            /^[가-하]\.$/.test(line) || 
                            /^\d+\.$/.test(line);
                            
            if (isHeading) {
                flushParagraph();
                structures.push({ type: 'heading', text: line });
            } else {
                currentParagraphLines.push(line);
            }
        }
        flushParagraph();
        return structures;
    }

    // 2단계: 보호된 블록 내부 정밀 문장 추출 모듈 (Safe Sentence Splitting)
    function splitSentences(text) {
        var t = text;
        // 판례문 내부 날짜 정합성 보호 코어 기믹 실행
        t = t.replace(/(\d{1,4})\s*\.\s*(\d{1,2})\s*\.\s*(\d{1,2})\s*\./g, "$1〔D〕$2〔D〕$3〔D〕");
        t = t.replace(/(\d{1,4})\s*\.\s*(\d{1,2})\s*\./g, "$1〔D〕$2〔D〕");
        t = t.replace(/(\b\d{1,2})\s*\.\s*(\d{1,2})\s*\./g, "$1〔D〕$2〔D〕");
        
        // 정식 한글/영문 문장 종결 마침표 지점 분할 인젝션
        t = t.replace(/([.?!])\s+(?=[^가-힣a-zA-Z0-9]*[가-힣a-zA-Z0-9])/g, "$1〔S_BREAK〕");
        t = t.replace(/〔D〕/g, ".");
        
        var sentences = t.split("〔S_BREAK〕");
        return sentences.map(function(s) { return s.trim(); }).filter(function(s) { return s.length > 0; });
    }

    // 3단계: 가공 서식 레이아웃 종합 조립 통제 엔진 (TXT 파일용)
    function generateFormattedText(structures) {
        var chunks = [];
        for (var i = 0; i < structures.length; i++) {
            var struct = structures[i];
            if (struct.type === 'heading') {
                chunks.push(struct.text);
            } else if (struct.type === 'paragraph') {
                var sentences = splitSentences(struct.text);
                // 규칙 1: 문장이 끝나고 다음 문장으로 넘어갈 때 단일 엔터 개행
                chunks.push(sentences.join('\n'));
            }
        }
        // 규칙 4: 문단과 문단 사이에는 완벽한 빈 칸인 줄 한 행 보장
        return chunks.join('\n\n');
    }

    async function fetchCaseTextReal(caseNum, isRaw) {
        var OC = sessionStorage.getItem('law_api_oc'); 
        if (!OC) throw { type: "KEY_ERROR", message: "우측 상단의 '인증키(oc)' 가 비어 있거나 세션이 만료되었습니다." };

        var isDetc = caseNum.includes("헌");
        var targetType = isDetc ? "detc" : "prec";
        
        var searchUrl = "https://www.law.go.kr/DRF/lawSearch.do?OC=" + OC + "&target=" + targetType + "&type=XML&query=" + encodeURIComponent(caseNum);
        if (isDetc) {
            searchUrl += "&mobileYn=Y";
        }
        var searchResponse = await fetchWithFallback(searchUrl, caseNum);
        
        var arrayBuffer = await searchResponse.arrayBuffer();
        var utf8Decoder = new TextDecoder('utf-8');
        var searchText = utf8Decoder.decode(arrayBuffer);
        
        if (!searchText.includes("PrecSearch") && !searchText.includes("precSearch") && !searchText.includes("DetcSearch") && !searchText.includes("detcSearch")) {
            var eucKrDecoder = new TextDecoder('euc-kr');
            searchText = eucKrDecoder.decode(arrayBuffer);
        }
        
        var blockTag = isDetc ? "detc" : "prec";
        var precBlocks = searchText.match(new RegExp("<" + blockTag + "[^>]*>([\\s\\S]*?)<\/" + blockTag + ">", "gi")) || [];
        var precSeq = "";
        var cleanTargetCase = getCoreCaseNumber(caseNum);
        var foundList = [];
        
        addLog("[" + caseNum + "] 검색 목록 매칭 파싱 시작...");
        
        for (var i = 0; i < precBlocks.length; i++) {
            var block = precBlocks[i];
            var blockCaseNumRaw = getXmlTagValue(block, "사건번호") || getXmlTagValue(block, "caseNumber") || "";
            var blockCaseNum = getCoreCaseNumber(blockCaseNumRaw);
            var blockSeq = "";
            if (isDetc) {
                blockSeq = getXmlTagValue(block, "헌재결정례일련번호") || getXmlTagValue(block, "detcSeq") || getXmlTagValue(block, "detcId") || "";
            } else {
                blockSeq = getXmlTagValue(block, "precSeq") || getXmlTagValue(block, "판례일련번호") || "";
            }
            
            if (blockCaseNumRaw) {
                foundList.push(blockCaseNumRaw);
            }
            
            if (blockCaseNum === cleanTargetCase) {
                precSeq = blockSeq;
                if (precSeq) {
                    var typeLabel = isDetc ? "헌법재판소 결정례" : "대법원 판례";
                    addLog("[" + caseNum + "] 100% 동일한 " + typeLabel + " 식별 일치 성공 (ID: " + precSeq + ")", "success");
                    break;
                }
            }
        }
        
        if (!precSeq && precBlocks.length > 0) {
            var firstBlock = precBlocks[0];
            if (isDetc) {
                precSeq = getXmlTagValue(firstBlock, "헌재결정례일련번호") || getXmlTagValue(firstBlock, "detcSeq") || getXmlTagValue(firstBlock, "detcId") || "";
            } else {
                precSeq = getXmlTagValue(firstBlock, "precSeq") || getXmlTagValue(firstBlock, "판례일련번호") || "";
            }
        }
        
        if (!precSeq) {
            var errMsg = getXmlTagValue(searchText, "errMsg");
            if (errMsg) throw { type: "KEY_ERROR", message: "법제처 API 오류 리포트: " + errMsg };
            
            if (foundList.length > 0) {
                throw { 
                    type: "API_RESTRICTED", 
                    message: "해당 판결은 존재하나, 법제처 Open API의 무료 개방 권한 범위를 벗어난 '지방법원/고등법원 하급심' 또는 '공개 비대상 결정례'에 속해 있습니다.", 
                    foundList: foundList 
                };
            } else {
                throw { 
                    type: "NOT_FOUND", 
                    message: "해당 사건번호 양식과 매핑되는 판결 정보가 존재하지 않습니다. 사건번호의 오타를 다시 한 번 점검해 주세요." 
                };
            }
        }

        if (isRaw) {
            addLog("[" + caseNum + "] 가공 없는 순수 XML 데이터 반환", "success");
            return searchText; // 파싱 데이터 가져오기 전용 트랙 우회
        }

        await new Promise(function(resolve) { setTimeout(resolve, 350); });

        var detailUrl = "https://www.law.go.kr/DRF/lawService.do?OC=" + OC + "&target=" + targetType + "&ID=" + precSeq + "&type=XML";
        var detailResponse = await fetchWithFallback(detailUrl, caseNum);
        
        var detailText = utf8Decoder.decode(await detailResponse.arrayBuffer());
        if (!detailText.includes("법원명") && !detailText.includes("기관명") && !detailText.includes("사건번호")) {
            detailText = new TextDecoder('euc-kr').decode(await detailResponse.arrayBuffer());
        }

        if (isRaw) {
            return detailText; 
        }

        var courtName = getXmlTagValue(detailText, "법원명") || getXmlTagValue(detailText, "기관명") || (isDetc ? "헌법재판소" : "");
        var sentenceDate = getXmlTagValue(detailText, "선고일자") || getXmlTagValue(detailText, "결정일자") || getXmlTagValue(detailText, "선고일") || getXmlTagValue(detailText, "결정일");
        var caseNumber = getXmlTagValue(detailText, "사건번호");
        var caseName = getXmlTagValue(detailText, "사건명");

        if (sentenceDate && sentenceDate.replace(/[^0-9]/g, "").length === 8) {
            var dStr = sentenceDate.replace(/[^0-9]/g, "");
            sentenceDate = dStr.substring(0, 4) + ". " + parseInt(dStr.substring(4, 6), 10) + ". " + parseInt(dStr.substring(6, 8), 10) + ".";
        }

        var stripHtmlOnly = function(str) {
            if (!str) return "";
            return str.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ');
        };

        var rawSummary1 = stripHtmlOnly(getXmlTagValue(detailText, "판시사항"));
        var rawSummary2 = stripHtmlOnly(getXmlTagValue(detailText, "결정요지") || getXmlTagValue(detailText, "판결요지"));
        
        var bodyTags = ["결정문", "전문", "판결문", "이유", "주문", "본문", "내용", "전문내용"];
        var rawTextBody = "";
        for (var t = 0; t < bodyTags.length; t++) {
            var extractedValue = stripHtmlOnly(getXmlTagValue(detailText, bodyTags[t]));
            if (extractedValue && extractedValue.length > rawTextBody.length) {
                rawTextBody = extractedValue;
            }
        }

        var verb = isDetc ? "결정" : "선고";
        var documentType = isDetc ? "결정" : "판결";
        
        // 콤팩트 구조적 텍스트 재컴파일 파트 가동
        var finalCourtHeader = courtName + " " + sentenceDate + " " + verb + " \n" + caseNumber + " " + documentType + " \n[" + caseName + "]\n";
        var formattedSummary1 = rawSummary1 ? "【판시사항】\n" + generateFormattedText(parseTextToStructures(rawSummary1)) : "";
        var formattedSummary2 = rawSummary2 ? (isDetc ? "【결정요지】\n" + generateFormattedText(parseTextToStructures(rawSummary2)) : "【판결요지】\n" + generateFormattedText(parseTextToStructures(rawSummary2))) : "";
        var formattedBodyText = rawTextBody ? generateFormattedText(parseTextToStructures(rawTextBody)) : "";
        
        if (formattedBodyText && !formattedBodyText.includes("【이유】") && !formattedBodyText.includes("【결정문】") && !formattedBodyText.includes("【전문】")) {
            formattedBodyText = (isDetc ? "【결정문 및 이유】\n" : "【이유】\n") + formattedBodyText;
        }

        var perfectFormattedText = finalCourtHeader + "\n" + formattedSummary1 + "\n" + formattedSummary2 + "\n" + formattedBodyText;
        addLog("[" + caseNum + "] 모든 본문 데이터 구조화 결합 완료", "success");
        return perfectFormattedText.trim();
    }

    async function handleDownload(type) {
        clearLog();
        var inputData = document.getElementById('searchInput').value;
        addLog("입력 데이터 및 사건번호 패턴 정밀 분석 가동 중...");
        
        var caseList = extractCaseNumbers(inputData);
        if (caseList.length === 0) {
            addLog("⚠️ 사건번호 규격이 감지되지 않았습니다. 올바른 양식으로 작성해 주세요 (예: 2011 두 13286).", "error");
            showToast("사건번호 규격이 감지되지 않았습니다.");
            return;
        }

        addLog("판례 수집 큐(Queue) 등록 [" + caseList.length + "개]: " + caseList.join(', '));

        if (!window.caseDataCache) {
            window.caseDataCache = {};
        }

        var collectedData = [];
        for (var i = 0; i < caseList.length; i++) {
            var caseNum = caseList[i];
            
            if (type !== 'raw' && window.caseDataCache[caseNum] && !window.caseDataCache[caseNum].isError) {
                addLog("[" + caseNum + "] 임시 메모리 캐시에 보관된 판결 데이터를 즉시 인젝션합니다.", "success");
                collectedData.push(window.caseDataCache[caseNum]);
                continue;
            }

            if (i > 0) {
                await new Promise(function(resolve) { setTimeout(resolve, 800); });
            }
            
            try {
                var content = await fetchCaseTextReal(caseNum, (type === 'raw'));
                var successItem = { title: caseNum, content: content, isError: false };
                
                if (type !== 'raw') window.caseDataCache[caseNum] = successItem;
                collectedData.push(successItem);
            } catch (err) {
                var errType = err.type || "NETWORK_ERROR";
                var errMsg = err.message || "서버 통신 장애 또는 프록시 네트워크 타임아웃이 발생했습니다.";
                
                addLog("❌ [" + caseNum + "] 수집 실패 원인: " + errMsg, "error");
                collectedData.push({ 
                    title: caseNum, 
                    content: errMsg, 
                    isError: true, 
                    errorType: errType,
                    errorMessage: errMsg 
                });
            }
        }

        if (type === 'txt' || type === 'raw') downloadTXT(collectedData, (type === 'raw'));
        else if (type === 'pdf') await downloadPDF(collectedData);
    }

    function downloadTXT(data, isRaw) {
        addLog(isRaw ? "순수 원본 데이터 스트림 반환 및 조립 중..." : "TXT 파일 조립 레이아웃 구성 중...");
        var output = "";
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            if (item.isError) {
                output += "⚠️ 수집 오류 (" + item.title + "): " + item.errorMessage + "\n";
            } else {
                output += item.content;
            }
            if (i < data.length - 1) {
                output += isRaw ? "\n\n" : "\n\n\n========================================\n\n\n";
            }
        }

        var blob = new Blob(["\uFEFF" + output], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = (isRaw ? "원본_" : "판례모음_") + new Date().toISOString().slice(0,10) + ".txt";
        a.click();
        URL.revokeObjectURL(url);
        addLog("🎉 파일 다운로드가 완료되었습니다.", "success");
    }

    async function fetchFontAsBase64(url, fontName) {
        try {
            var response = await fetch(url);
            if(!response.ok) return null;
            var blob = await response.blob();
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
                reader.onerror = function() { resolve(null); };
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            return null;
        }
    }

    // ==========================================
    // [구조 통제형 PDF 렌더링 엔진]
    // ==========================================
    async function downloadPDF(data) {
        addLog("PDF 컴파일러 가동 및 한글 폰트 주입 분석 중...");
        try {
            var fontBase64Regular = await fetchFontAsBase64("./NotoSansKR-Regular.ttf", "NotoSansKR Regular");
            var fontBase64Bold = await fetchFontAsBase64("./NotoSansKR-Bold.ttf", "NotoSansKR Bold");

            if (!fontBase64Regular) {
                fontBase64Regular = await fetchFontAsBase64("https://cdn.jsdelivr.net/gh/sunnypark/noto-sans-kr-minify@master/fonts/NotoSansKR-Regular.ttf", "NotoSansKR Regular (예비)");
            }
            if (!fontBase64Bold) {
                fontBase64Bold = await fetchFontAsBase64("https://cdn.jsdelivr.net/gh/sunnypark/noto-sans-kr-minify@master/fonts/NotoSansKR-Bold.ttf", "NotoSansKR Bold (CDN 예비)");
            }

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            if (fontBase64Regular) doc.addFileToVFS("NotoSansKR-Regular.ttf", fontBase64Regular), doc.addFont("NotoSansKR-Regular.ttf", "NotoSansKR", "normal");
            if (fontBase64Bold) doc.addFileToVFS("NotoSansKR-Bold.ttf", fontBase64Bold), doc.addFont("NotoSansKR-Bold.ttf", "NotoSansKR-Bold", "normal");

            var margin = 10, pageWidth = 210, pageHeight = 297, printWidth = pageWidth - (margin * 2), bottomLimit = pageHeight - margin;
            var fontSizeTitle = 15, fontSizeBody = 10, lineHeightDefault = fontSizeBody * 0.3528 * 1.5; 

            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                if (i > 0) doc.addPage();

                if (item.isError) {
                    addLog("[" + item.title + "] PDF 우회 링크 페이지 생성 중...");
                    var currentY = margin + 10;
                    if (fontBase64Bold) doc.setFont("NotoSansKR-Bold", "normal");
                    doc.setFontSize(fontSizeTitle); doc.setTextColor(220, 53, 69);
                    doc.text("판례 수집 실패 보고서", margin, currentY);
                    currentY += (fontSizeTitle * 0.3528 * 1.5) + 6;

                    if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                    doc.setFontSize(fontSizeBody); doc.setTextColor(32, 33, 36);
                    doc.text("대상 사건번호: " + item.title, margin, currentY);
                    currentY += lineHeightDefault + 8;

                    doc.setTextColor(108, 117, 125);
                    var detailDesc = "해당 판례 정보를 가져오지 못했습니다. 번호 및 키를 확인하세요.";
                    var descLines = doc.splitTextToSize(detailDesc, printWidth);
                    for (var k = 0; k < descLines.length; k++) {
                        doc.text(descLines[k], margin, currentY); currentY += lineHeightDefault;
                    }
                    continue;
                }

                addLog("[" + item.title + "] 고급 독해용 구조적 레이아웃 드로잉 중...");
                
                // 생성된 포맷 결과물을 거시적 블록 구조로 역인식 복원 가동
                var structures = parseTextToStructures(item.content);
                var currentY = margin + 5;

                for (var s = 0; s < structures.length; s++) {
                    var struct = structures[s];
                    var trimmedText = struct.text.trim();

                    if (struct.type === 'heading') {
                        if (fontBase64Bold) doc.setFont("NotoSansKR-Bold", "normal");
                        var fSize = trimmedText.startsWith('【') ? 12 : 11;
                        doc.setFontSize(fSize);
                        doc.setTextColor(26, 115, 232); // 타이틀 인덱스 블루 세팅

                        var hLineHeight = fSize * 0.3528 * 1.5;
                        var hLines = doc.splitTextToSize(trimmedText, printWidth);
                        
                        for (var k = 0; k < hLines.length; k++) {
                            if (currentY > bottomLimit) {
                                doc.addPage();
                                if (fontBase64Bold) doc.setFont("NotoSansKR-Bold", "normal");
                                doc.setFontSize(fSize); currentY = margin + 10;
                            }
                            doc.text(hLines[k], margin, currentY); currentY += hLineHeight;
                        }
                        currentY += 2; // 타이틀 하단 여백 보정

                    } else if (struct.type === 'paragraph') {
                        if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                        doc.setFontSize(fontSizeBody); doc.setTextColor(32, 33, 36);

                        var sentences = splitSentences(trimmedText);
                        var intraLineHeight = fontSizeBody * 0.3528 * 1.5; // 규칙 2: 한 문장 내부 자동 래핑 줄간격 1.5

                        for (var st = 0; st < sentences.length; st++) {
                            var sLines = doc.splitTextToSize(sentences[st], printWidth);
                            
                            for (var k = 0; k < sLines.length; k++) {
                                if (currentY > bottomLimit) {
                                    doc.addPage();
                                    if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                                    doc.setFontSize(fontSizeBody); currentY = margin + 10;
                                }
                                doc.text(sLines[k], margin, currentY); currentY += intraLineHeight;
                            }

                            // 규칙 3: 문장과 문장 사이를 가르는 간격은 정밀 2.0 배정 (1.5 + 0.5 패딩 추가)
                            if (st < sentences.length - 1) {
                                currentY += (fontSizeBody * 0.3528 * 0.5);
                            }
                        }
                        // 규칙 4: 문단 간 구분을 위한 완벽한 빈 행 마진 추가
                        currentY += lineHeightDefault;
                    }
                }
            }

            addLog("바이너리 스트림 파일 출력 배출 중...");
            doc.save("판례모음_" + new Date().toISOString().slice(0,10) + ".pdf");
            showToast("구조적 가독성이 반영된 PDF 다운로드가 완료되었습니다!");
        } catch (error) {
            addLog("❌ PDF 최종 결합 치명적 실패: " + error.message, 'error');
        }
    }
</script>
