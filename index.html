<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판례 검색기</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* 업로드된 한국어 대응 구글 정적 폰트 패키지를 웹 UI 전체에 다이내믹 바인딩 */
        @font-face {
            font-family: 'Noto Sans KR Custom';
            src: url('./NotoSansKR-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Noto Sans KR Custom';
            src: url('./NotoSansKR-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans KR Custom', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            color: #202124;
        }
        
        .search-container {
            text-align: center;
            width: 100%;
            max-width: 700px;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-top: -20px;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .oc-container {
            margin-bottom: 15px;
            text-align: right;
        }
        .oc-input {
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }
        .oc-input:focus {
            border-color: #1a73e8;
        }

        .search-box-wrapper {
            position: relative;
            width: 100%;
        }
        .search-box {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 28px;
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
        }
        .search-box:focus, .search-box:hover {
            box-shadow: 0 2px 8px rgba(32, 33, 36, 0.15);
            border-color: rgba(0,0,0,0);
        }
        .btn-container {
            margin-top: 20px;
        }
        button {
            background-color: #f1f3f4;
            border: 1px solid #f1f3f4;
            border-radius: 24px;
            color: #3c4043;
            font-size: 14px;
            font-weight: 500;
            margin: 8px 6px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.15s;
        }
        button:hover {
            background-color: #e8eaed;
            border-color: #dadce0;
            color: #202124;
        }
        
        button.btn-raw {
            background-color: #e8f0fe;
            border-color: #d2e3fc;
            color: #1967d2;
        }
        button.btn-raw:hover {
            background-color: #d2e3fc;
            border-color: #1a73e8;
            color: #1a73e8;
        }
        
        .log-wrapper {
            margin-top: 25px;
            text-align: left;
            display: none;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .log-title {
            font-size: 12px;
            font-weight: bold;
            color: #5f6368;
        }
        .copy-btn {
            margin: 0;
            padding: 5px 12px;
            font-size: 11px;
            background-color: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 6px;
            color: #1a73e8;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }
        .copy-btn:hover {
            background-color: #f8f9fa;
            border-color: #1a73e8;
        }

        .log-box {
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #e8eaed;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            color: #3c4043;
            max-height: 220px;
            overflow-y: auto;
        }
        .log-line {
            margin: 4px 0;
            line-height: 1.4;
            word-break: break-all;
        }
        .log-success { color: #137333; font-weight: bold; }
        .log-error { color: #c5221f; font-weight: bold; }
        .log-info { color: #1a73e8; }
        .log-warn { color: #b06000; font-weight: bold; }

        .info-text {
            margin-top: 35px;
            font-size: 12px;
            color: #70757a;
            line-height: 1.6;
            border-top: 1px solid #f1f3f4;
            padding-top: 15px;
        }

        #toast {
            display: none;
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            background-color: #323232;
            color: #ffffff;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            z-index: 99999;
            transition: all 0.2s;
        }
    </style>
</head>
<body>

<div class="search-container">
    <div class="main-title">판례 검색기</div>
    
    <div class="oc-container">
        <input type="password" id="ocInput" class="oc-input" placeholder="법제처 인증키(oc) 입력 후 엔터" onchange="saveOCKey()">
    </div>

    <div class="search-box-wrapper">
        <input type="text" id="searchInput" class="search-box" placeholder="아무 대화 내용이나 판결문 본문을 그대로 붙여넣으세요" autocomplete="off">
    </div>
    
    <div class="btn-container">
        <button onclick="handleDownload('txt')">TXT 파일 다운로드</button>
        <button onclick="handleDownload('pdf')">PDF 파일 다운로드</button>
        <button class="btn-raw" onclick="handleDownload('raw')">파싱 데이터 가져오기</button>
    </div>
    
    <div id="logWrapper" class="log-wrapper">
        <div class="log-header">
            <span class="log-title">실시간 구동 로그</span>
            <button class="copy-btn" onclick="copyLog()">로그 복사</button>
        </div>
        <div id="logBox" class="log-box"></div>
    </div>

    <div class="info-text">
        ※ 임의의 텍스트 속에서 법원 사건번호 양식을 자동으로 똑똑하게 인식하여 리스트화합니다.<br>
        오른쪽 상단에 인증키(oc)를 입력해 두시면 현재 탭 세션 동안 임시 저장됩니다. (페이지를 완전히 닫으면 삭제)
    </div>
</div>

<div id="toast"></div>

<script>
    window.onerror = function(msg, url, lineNo) {
        addLog("시스템 예외 감지: " + msg + " (Line: " + lineNo + ")", "error");
        return false;
    };

    function showToast(message) {
        var toast = document.getElementById("toast");
        toast.innerText = message;
        toast.style.display = "block";
        setTimeout(function() {
            toast.style.display = "none";
        }, 3000);
    }

    var proxyHealth = {
        "https://corsproxy.io/?": { fails: 0, lastFail: 0 },
        "https://api.codetabs.com/v1/proxy?url=": { fails: 0, lastFail: 0 },
        "https://api.allorigins.win/raw?url=": { fails: 0, lastFail: 0 }
    };
    window.lastSuccessfulProxy = sessionStorage.getItem('last_working_proxy') || "";

    window.onload = function() {
        try {
            if (localStorage.getItem('law_api_oc')) {
                localStorage.removeItem('law_api_oc');
            }
            
            var savedOC = sessionStorage.getItem('law_api_oc');
            if (savedOC) {
                document.getElementById('ocInput').value = savedOC;
            }
            
            window.caseDataCache = {};
        } catch (e) {}
    };

    function saveOCKey() {
        var ocValue = document.getElementById('ocInput').value.trim();
        try {
            sessionStorage.setItem('law_api_oc', ocValue);
            showToast("인증키가 현재 세션에 임시 저장되었습니다. (창을 닫으면 자동 소멸)");
        } catch (e) {}
    }

    function clearLog() {
        var logBox = document.getElementById('logBox');
        var logWrapper = document.getElementById('logWrapper');
        logBox.innerHTML = '';
        logWrapper.style.display = 'block';
    }

    function addLog(message, type) {
        if (!type) type = 'info';
        var logBox = document.getElementById('logBox');
        var line = document.createElement('div');
        line.className = 'log-line log-' + type;
        var timestamp = new Date().toLocaleTimeString();
        line.innerText = '[' + timestamp + '] ' + message;
        logBox.appendChild(line);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function copyLog() {
        var logBox = document.getElementById('logBox');
        if (!logBox) return;
        var logText = logBox.innerText;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(logText).then(function() {
                showToast("로그가 클립보드에 복사되었습니다!");
            }).catch(function() {
                fallbackCopy(logText);
            });
        } else {
            fallbackCopy(logText);
        }
    }

    function fallbackCopy(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            showToast("로그가 클립보드에 복사되었습니다!");
        } catch (err) {
            showToast("복사에 실패했습니다. 직접 선택하여 복사해 주세요.");
        }
        document.body.removeChild(textarea);
    }

    function extractCaseNumbers(text) {
        if (!text) return [];
        
        var caseRegex = /\d{2,4}\s*[가-힣]{1,3}\s*\d+/g;
        var matches = text.match(caseRegex) || [];
        
        var cleanedMatches = matches.map(function(item) {
            return item.replace(/\s+/g, ""); 
        });
        
        return cleanedMatches.filter(function(item, pos) {
            return cleanedMatches.indexOf(item) === pos;
        });
    }

    function getSmartOrderedProxies() {
        var proxies = [
            "https://corsproxy.io/?",
            "https://api.codetabs.com/v1/proxy?url=",
            "https://api.allorigins.win/raw?url="
        ];
        
        var now = Date.now();
        
        proxies.sort(function(a, b) {
            var hA = proxyHealth[a];
            var hB = proxyHealth[b];
            
            var penaltyA = (hA.fails > 0 && (now - hA.lastFail < 45000)) ? hA.fails : 0;
            var penaltyB = (hB.fails > 0 && (now - hB.lastFail < 45000)) ? hB.fails : 0;
            
            if (penaltyA !== penaltyB) {
                return penaltyA - penaltyB;
            }
            
            if (a === window.lastSuccessfulProxy) return -1;
            if (b === window.lastSuccessfulProxy) return 1;
            return Math.random() - 0.5;
        });

        return proxies;
    }

    async function fetchWithFallback(targetUrl, caseNum) {
        var activeProxies = getSmartOrderedProxies();

        for (var i = 0; i < activeProxies.length; i++) {
            if (i > 0) {
                await new Promise(function(resolve) { setTimeout(resolve, 300); });
            }

            var currentProxy = activeProxies[i];
            var proxyName = currentProxy.includes("corsproxy") ? "고속망" : currentProxy.includes("codetabs") ? "기본망" : "비상망";
            
            try {
                var finalUrl = currentProxy + encodeURIComponent(targetUrl);
                var controller = new AbortController();
                
                var timeoutDuration = (i === 0) ? 3000 : 4500;
                var id = setTimeout(function() { controller.abort(); }, timeoutDuration); 
                
                var res = await fetch(finalUrl, { signal: controller.signal });
                clearTimeout(id);
                if (res.ok) {
                    proxyHealth[currentProxy].fails = 0; 
                    window.lastSuccessfulProxy = currentProxy;
                    sessionStorage.setItem('last_working_proxy', currentProxy);
                    return res;
                }
                throw new Error("HTTP Status " + res.status);
            } catch (e) {
                proxyHealth[currentProxy].fails++;
                proxyHealth[currentProxy].lastFail = Date.now();
                
                if (currentProxy === window.lastSuccessfulProxy) {
                    window.lastSuccessfulProxy = "";
                    sessionStorage.removeItem('last_working_proxy');
                }
                addLog("⚠️ [" + caseNum + "] " + proxyName + " 장애 또는 지연 감지. 대체 회선으로 우회 처리합니다.", "warn");
            }
        }
        throw { type: "NETWORK_ERROR", message: "모든 CORS 우회 통신망이 일시적으로 차단되었거나 타임아웃 정체 상태입니다." };
    }

    function getXmlTagValue(text, tagName) {
        try {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(text, "text/xml");
            if (!xmlDoc.getElementsByTagName("parsererror").length) {
                var element = xmlDoc.getElementsByTagName(tagName)[0];
                if (element) return element.textContent.trim();
            }
        } catch (e) {}
        
        var regex = new RegExp("<" + tagName + "[^>]*>([\\s\\S]*?)<\/" + tagName + ">", "i");
        var match = text.match(regex);
        if (match && match[1]) {
            return match[1].replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1").trim();
        }
        return "";
    }

    function getCoreCaseNumber(str) {
        if (!str) return "";
        var normalized = str.replace(/\s+/g, "");
        var matchesNorm = normalized.match(/\d{2,4}[가-힣]{1,3}\d+/);
        return matchesNorm ? matchesNorm[0] : normalized.replace(/[^가-힣0-9]/g, "");
    }

    function formatSection(text, sectionType, isDetc) {
        if (!text) return "";
        
        // 가로 공백을 깔끔하게 일선 정돈합니다.
        var formatted = text.replace(/[ \t]+/g, ' ');
        
        // 1. 주요 권역별 대괄호 타이틀(【주문】, 【이유】 등) 앞뒤로 시각적 여백(빈 줄)을 확실하게 확보합니다.
        formatted = formatted.replace(/\s*(【[^】]+】)\s*/g, "\n\n$1\n\n");
    
        // 2. [1], [2] 같은 판시사항 및 결정요지 목차 기호가 문장 뒤에 바짝 붙어있다면 개행을 주어 가독성을 높입니다.
        formatted = formatted.replace(/([^\n])\s*(\[(\d+)\])/g, "$1\n\n$2 ");
    
        // 3. 데이터 결합 과정에서 우연히 발생할 수 있는 3단 이상의 과도한 연속 개행을 깔끔하게 2단(빈 줄 하나)으로 축소 정돈합니다.
        formatted = formatted.replace(/\n{3,}/g, "\n\n");
        
        return formatted.trim();
    }
        
    var cleanText = function(str, isDetc) {
        if (!str) return "";
        
        // [조건부 치환]: 헌재 판례(isDetc)이면 \n, 대법원 판례(!isDetc)이면 \n\n으로 멀티플렉싱
        var breakReplacement = isDetc ? '\n' : '\n\n';
        var cleaned = str.replace(/<br\s*\/?>/gi, breakReplacement);
        
        // 나머지 태그 제거 및 공백 정돈 구조는 동일하게 유지
        cleaned = cleaned.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ');
        cleaned = cleaned.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        cleaned = cleaned.replace(/[ \t]+/g, ' ');
        
        return cleaned.trim();
    }; 

    async function fetchCaseTextReal(caseNum, isRaw) {
        var OC = sessionStorage.getItem('law_api_oc'); 
        if (!OC) throw { type: "KEY_ERROR", message: "우측 상단의 '인증키(oc)' 가 비어 있거나 세션이 만료되었습니다." };

        var isDetc = caseNum.includes("헌");
        var targetType = isDetc ? "detc" : "prec";
        
        var searchUrl = "https://www.law.go.kr/DRF/lawSearch.do?OC=" + OC + "&target=" + targetType + "&type=XML&query=" + encodeURIComponent(caseNum);
        if (isDetc) {
            searchUrl += "&mobileYn=Y";
        }
        var searchResponse = await fetchWithFallback(searchUrl, caseNum);
        
        var arrayBuffer = await searchResponse.arrayBuffer();
        var utf8Decoder = new TextDecoder('utf-8');
        var searchText = utf8Decoder.decode(arrayBuffer);
        
        if (!searchText.includes("PrecSearch") && !searchText.includes("precSearch") && !searchText.includes("DetcSearch") && !searchText.includes("detcSearch")) {
            var eucKrDecoder = new TextDecoder('euc-kr');
            searchText = eucKrDecoder.decode(arrayBuffer);
        }
        
        var blockTag = isDetc ? "detc" : "prec";
        
        // [문제 2번 패스트 패일 해결]: 검색 텍스트를 받아온 직후 totalCnt 검증을 거치도록 배치하여 없는 판례 검증 지연 원천 차단
        var totalCnt = getXmlTagValue(searchText, "totalCnt");
        
        // [버그 수정]: 법제처 XML 태그의 대소문자(DetcSearch 등) 변화에 유연하게 대응하도록 toLowerCase() 처리 적용
        if (totalCnt === "0" || totalCnt === "" || !searchText.toLowerCase().includes("<" + blockTag.toLowerCase())) {
            throw { type: "NOT_FOUND", message: "해당 사건번호 양식과 매핑되는 판결 정보가 존재하지 않습니다." };
        }        

        await new Promise(function(resolve) { setTimeout(resolve, 350); });

        var detailUrl = "https://www.law.go.kr/DRF/lawService.do?OC=" + OC + "&target=" + targetType + "&ID=" + getXmlTagValue(searchText, isDetc ? "헌재결정례일련번호" : "판례일련번호") + "&type=XML";
        var detailResponse = await fetchWithFallback(detailUrl, caseNum);
        
        var detailBuffer = await detailResponse.arrayBuffer();
        var detailText = utf8Decoder.decode(detailBuffer);
        if (!detailText.includes("법원명") && !detailText.includes("기관명") && !detailText.includes("사건번호")) {
            detailText = new TextDecoder('euc-kr').decode(detailBuffer);
        }

        // [문제 3번 로직 복원 완료]: 사용자가 명령하신 사후 상세조회 전체 원형 구조 XML 100% 보존 출력 트랙
        if (isRaw) {
            addLog("[" + caseNum + "] 가공 없는 순수 원본 상세조회 XML 스트링 출력 성립", "success");
            return detailText;
        }


        
        // 1. 원본 XML 내부의 모든 메타데이터 태그 빠짐없이 추출
        var caseSerial = getXmlTagValue(detailText, "판례정보일련번호") || getXmlTagValue(detailText, "헌재결정례일련번호");
        var caseName = getXmlTagValue(detailText, "사건명");
        var caseNumber = getXmlTagValue(detailText, "사건번호");
        var sentenceDate = getXmlTagValue(detailText, "선고일자") || getXmlTagValue(detailText, "결정일자") || getXmlTagValue(detailText, "선고일") || getXmlTagValue(detailText, "결정일");
        var sentenceType = getXmlTagValue(detailText, "선고") || getXmlTagValue(detailText, "결정");
        var courtName = getXmlTagValue(detailText, "법원명") || getXmlTagValue(detailText, "기관명") || (isDetc ? "헌법재판소" : "");
        var courtCode = getXmlTagValue(detailText, "법원종류코드");
        var caseTypeName = getXmlTagValue(detailText, "사건종류명");
        var caseTypeCode = getXmlTagValue(detailText, "사건종류코드");
        var judgmentType = getXmlTagValue(detailText, "판결유형") || getXmlTagValue(detailText, "결정유형");

        // 선고일자 가독성 포맷팅 (YYYY. MM. DD. 형식)
        if (sentenceDate && sentenceDate.replace(/[^0-9]/g, "").length === 8) {
            var dStr = sentenceDate.replace(/[^0-9]/g, "");
            sentenceDate = dStr.substring(0, 4) + ". " + parseInt(dStr.substring(4, 6), 10) + ". " + parseInt(dStr.substring(6, 8), 10) + ".";
        }

        // [상단 레이아웃] 모든 메타데이터를 누락 없이 텍스트 화화여 배치
        var perfectHeader = "【기본 정보】\n" +
                            "• 법원/기관명 : " + (courtName || "정보 없음") + "\n" +
                            "• 사건번호 : " + (caseNumber || "정보 없음") + "\n" +
                            "• 사건명 : " + (caseName || "정보 없음") + "\n" +
                            "• 선고/결정일자 : " + (sentenceDate || "정보 없음") + (sentenceType ? " (" + sentenceType + ")" : "") + "\n" +
                            "• 판결/결정유형 : " + (judgmentType || "정보 없음") + "\n" +
                            "• 사건종류 : " + (caseTypeName || "정보 없음") + (caseTypeCode ? " (코드: " + caseTypeCode + ")" : "") + "\n" +
                            "• 관리 일련번호 : " + (caseSerial || "정보 없음") + "\n" +
                            "• 법원종류코드 : " + (courtCode || "정보 없음") + "\n" +
                            "--------------------------------------------------\n";

        // 2. 내용 세부 항목 추출 시 cleanText에 isDetc 인자를 함께 전달
        var summary1 = cleanText(getXmlTagValue(detailText, "판시사항"), isDetc);
        var summary2 = cleanText(getXmlTagValue(detailText, "결정요지") || getXmlTagValue(detailText, "판결요지"), isDetc);
        var refLaw = cleanText(getXmlTagValue(detailText, "참조조문"), isDetc);
        var refPrecedent = cleanText(getXmlTagValue(detailText, "참조판례"), isDetc);
        
        // 3. 본문 텍스트 추출 루프 영역 수정
        var bodyTags = ["판례내용", "결정문", "전문", "판결문", "이유", "주문", "본문", "내용", "전문내용"];
        var textBody = "";
        for (var t = 0; t < bodyTags.length; t++) {
            var extractedValue = cleanText(getXmlTagValue(detailText, bodyTags[t]), isDetc); // <- isDetc 추가
            if (extractedValue && extractedValue.length > textBody.length) {
                textBody = extractedValue;
            }
        }

        // CDATA 영역 예외 백업 추출 영역 수정
        if (!textBody || textBody.length < 150) {
            var cdataRegex = /<!\[CDATA\[([\s\S]*?)\]\]>/gi;
            var cdataMatch;
            var longestCdata = "";
            while ((cdataMatch = cdataRegex.exec(detailText)) !== null) {
                var cdataContent = cleanText(cdataMatch[1], isDetc); // <- isDetc 추가
                if (cdataContent.length > longestCdata.length) {
                    longestCdata = cdataContent;
                }
            }
            if (longestCdata.length > textBody.length) {
                textBody = longestCdata;
            }
        }
        
        // 4. 각 텍스트 블록별 마크다운 스타일 레이아웃 구성
        var formattedSummary1 = summary1 ? "【판시사항】\n" + formatSection(summary1, 'summary', isDetc) : "";
        var formattedSummary2 = summary2 ? (isDetc ? "【결정요지】\n" + formatSection(summary2, 'summary', isDetc) : "【판결요지】\n" + formatSection(summary2, 'summary', isDetc)) : "";
        var formattedRefLaw = refLaw ? "【참조조문】\n" + formatSection(refLaw, 'summary', isDetc) : "";
        var formattedRefPrecedent = refPrecedent ? "【참조판례】\n" + formatSection(refPrecedent, 'summary', isDetc) : "";
        
        var formattedBodyText = textBody ? "【본문 내용】\n" + formatSection(textBody, 'body', isDetc) : "【본문 내용】\n(※ 본 판례는 요약 정보만 제공되는 항목입니다.)";

        // 5. 추출된 모든 파트를 단 하나의 공백이나 누락 없이 완전 결합
        var perfectFormattedText = perfectHeader + "\n" + 
                                   formattedSummary1 + "\n" + 
                                   formattedSummary2 + "\n" + 
                                   formattedRefLaw + "\n" + 
                                   formattedRefPrecedent + "\n" + 
                                   formattedBodyText;

        addLog("[" + caseNum + "] 모든 본문 데이터 결합 및 최적화 개행 완료", "success");
        return perfectFormattedText.trim();
    }

    
    async function handleDownload(type) {
        clearLog();
        var inputData = document.getElementById('searchInput').value;
        addLog("입력 데이터 및 사건번호 패턴 정밀 분석 가동 중...");
        
        var caseList = extractCaseNumbers(inputData);
        if (caseList.length === 0) {
            addLog("⚠️ 사건번호 규격이 감지되지 않았습니다. 올바른 양식으로 작성해 주세요 (예: 2011 두 13286).", "error");
            showToast("사건번호 규격이 감지되지 않았습니다.");
            return;
        }

        addLog("판례 수집 큐(Queue) 등록 [" + caseList.length + "개]: " + caseList.join(', '));

        if (!window.caseDataCache) {
            window.caseDataCache = {};
        }

        var collectedData = [];
        for (var i = 0; i < caseList.length; i++) {
            var caseNum = caseList[i];
            
            if (type !== 'raw' && window.caseDataCache[caseNum] && !window.caseDataCache[caseNum].isError) {
                addLog("[" + caseNum + "] 임시 메모리 캐시에 보관된 판결 데이터를 즉시 인젝션합니다.", "success");
                collectedData.push(window.caseDataCache[caseNum]);
                continue;
            }

            // 대량 판례 연속 호출 시 방화벽 정체 우회를 위해 탄력적 페이싱 메커니즘 보강 배정
            if (i > 0) {
                var dynamicDelay = i > 3 ? 1200 : 800;
                await new Promise(function(resolve) { setTimeout(resolve, dynamicDelay); });
            }
            
            try {
                var content = await fetchCaseTextReal(caseNum, (type === 'raw'));
                var successItem = { title: caseNum, content: content, isError: false };
                
                if (type !== 'raw') window.caseDataCache[caseNum] = successItem;
                collectedData.push(successItem);
            } catch (err) {
                var errType = err.type || "NETWORK_ERROR";
                var errMsg = err.message || "서버 통신 장애 또는 프록시 네트워크 타임아웃이 발생했습니다.";
                
                addLog("❌ [" + caseNum + "] 수집 실패 원인: " + errMsg, "error");
                collectedData.push({ 
                    title: caseNum, 
                    content: errMsg, 
                    isError: true, 
                    errorType: errType,
                    errorMessage: errMsg 
                });
            }
        }

        if (type === 'txt' || type === 'raw') downloadTXT(collectedData, (type === 'raw'));
        else if (type === 'pdf') await downloadPDF(collectedData);
    }

    function downloadTXT(data, isRaw) {
        addLog(isRaw ? "순수 원본 데이터 스트림 반환 및 조립 중..." : "TXT 파일 조립 레이아웃 구성 중...");
        var output = "";
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            if (item.isError) {
                output += "⚠️ 수집 오류 (" + item.title + "): " + item.errorMessage + "\n";
            } else {
                output += item.content;
            }
            if (i < data.length - 1) {
                output += isRaw ? "\n\n" : "\n\n\n========================================\n\n\n";
            }
        }

        var blob = new Blob(["\uFEFF" + output], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = (isRaw ? "원본_" : "판례모음_") + new Date().toISOString().slice(0,10) + ".txt";
        a.click();
        URL.revokeObjectURL(url);
        addLog("🎉 파일 다운로드가 완료되었습니다.", "success");
    }

    async function fetchFontAsBase64(url, fontName) {
        try {
            var response = await fetch(url);
            if(!response.ok) return null;
            var blob = await response.blob();
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
                reader.onerror = function() { resolve(null); };
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            return null;
        }
    }

    async function downloadPDF(data) {
        addLog("PDF 컴파일러 가동 및 한글 폰트 주입 분석 중...");
        try {
            var fontBase64Regular = await fetchFontAsBase64("./NotoSansKR-Regular.ttf", "NotoSansKR Regular");
            var fontBase64Bold = await fetchFontAsBase64("./NotoSansKR-Bold.ttf", "NotoSansKR Bold");

            if (!fontBase64Regular) {
                fontBase64Regular = await fetchFontAsBase64("https://cdn.jsdelivr.net/gh/sunnypark/noto-sans-kr-minify@master/fonts/NotoSansKR-Regular.ttf", "NotoSansKR Regular (예비)");
            }
            if (!fontBase64Bold) {
                fontBase64Bold = await fetchFontAsBase64("https://cdn.jsdelivr.net/gh/sunnypark/noto-sans-kr-minify@master/fonts/NotoSansKR-Bold.ttf", "NotoSansKR Bold (CDN 예비)");
            }

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            if (fontBase64Regular) doc.addFileToVFS("NotoSansKR-Regular.ttf", fontBase64Regular), doc.addFont("NotoSansKR-Regular.ttf", "NotoSansKR", "normal");
            if (fontBase64Bold) doc.addFileToVFS("NotoSansKR-Bold.ttf", fontBase64Bold), doc.addFont("NotoSansKR-Bold.ttf", "NotoSansKR-Bold", "normal");

            if (fontBase64Regular || fontBase64Bold) {
                doc.setFont("NotoSansKR", "normal");
            }

            var margin = 10, pageWidth = 210, pageHeight = 297, printWidth = pageWidth - (margin * 2), bottomLimit = pageHeight - margin;
            var fontSizeTitle = 15, fontSizeBody = 10, lineHeightDefault = fontSizeBody * 0.3528 * 2; 

            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                if (i > 0) doc.addPage();

                if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                doc.setTextColor(32, 33, 36);

                if (item.isError) {
                    var currentY = margin + 10;
                    if (fontBase64Bold) doc.setFont("NotoSansKR-Bold", "normal");
                    doc.setFontSize(fontSizeTitle); doc.setTextColor(220, 53, 69);
                    doc.text("판례 수집 실패 보고서", margin, currentY);
                    currentY += (fontSizeTitle * 0.3528 * 2) + 6;

                    if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                    doc.setFontSize(fontSizeBody); doc.setTextColor(32, 33, 36);
                    doc.text("대상 사건번호: " + item.title, margin, currentY);
                    currentY += lineHeightDefault + 8;

                    doc.setTextColor(108, 117, 125);
                    var detailDesc = "";
                    if (item.errorType === "API_RESTRICTED") {
                        detailDesc = "해당 판결은 존재하나, 법제처 Open API의 무료 개방 권한 범위를 벗어난 '지방법원/고등법원 하급심' 또는 '공개 비대상 결정례'에 속해 있습니다.";
                    } else if (item.errorType === "NOT_FOUND") {
                        detailDesc = "해당 사건번호가 법제처 데이터베이스에 존재하지 않거나 오타가 있습니다. 사건번호의 한글 및 일련번호 자릿수를 다시 한 번 확인해 주세요.";
                    } else if (item.errorType === "KEY_ERROR") {
                        detailDesc = "입력해 두신 법제처 API 인증키(oc)가 만료되었거나 올바르지 않습니다. 국가법령정보센터에서 신규 공동활용 키를 신청하여 입력창 우측 상단에 등록해 주세요.";
                    } else {
                        detailDesc = "대량 수집 중 동시 트래픽 정체 또는 법제처 국가 서버의 대역폭 한계로 임시 타임아웃 오류가 발생했습니다.";
                    }
                    
                    var descLines = doc.splitTextToSize(detailDesc, printWidth);
                    for (var k = 0; k < descLines.length; k++) {
                        doc.text(descLines[k], margin, currentY); currentY += lineHeightDefault;
                    }
                    continue;
                }

                addLog("[" + item.title + "] 독해용 레이아웃 구성 및 도면 드로잉 중...");
                var currentY = margin + 5;
                var paragraphs = item.content.split('\n');
                var nonSpaceParaCount = 0; 

                for (var j = 0; j < paragraphs.length; j++) {
                    var para = paragraphs[j];
                    
                    if (para.trim() === "") {
                        currentY += lineHeightDefault; 
                        continue;
                    }
    
                    nonSpaceParaCount++;
    
                    var isBold = false;
                    var currentFontSize = fontSizeBody; 
                    var trimmed = para.trim();
    
                    // 1. 상단 타이틀 영역(첫 3줄)은 크기만 12로 지정하고 bold는 적용하지 않음
                    if (nonSpaceParaCount <= 3) {
                        currentFontSize = 12; 
                    } 
                    // 2. 오직 【 】 기호가 명시적으로 포함된 핵심 목차 라인만 볼드 처리 및 크기 11 지정
                    else if (trimmed.includes("【") && trimmed.includes("】")) {
                        isBold = true; 
                        currentFontSize = 11; 
                    } 
                    // 3. 그 외의 모든 일반 본문, 가.나.다. 목차, 대법관 이름 등은 기본 크기 10 및 일반 폰트 적용
                    else {
                        currentFontSize = 10; 
                    }
    
                    if (isBold && fontBase64Bold) {
                        doc.setFont("NotoSansKR-Bold", "normal");
                    } else if (fontBase64Regular) {
                        doc.setFont("NotoSansKR", "normal");
                    }
                    doc.setFontSize(currentFontSize);

                    var currentLineHeight = currentFontSize * 0.3528 * 2;

                    var lines = doc.splitTextToSize(para, printWidth);
                    for (var k = 0; k < lines.length; k++) {
                        if (currentY > bottomLimit) {
                            doc.addPage();
                            if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                            if (isBold && fontBase64Bold) doc.setFont("NotoSansKR-Bold", "normal");
                            doc.setFontSize(currentFontSize);
                            currentY = margin + 10;
                        }
                        doc.text(lines[k], margin, currentY);
                        currentY += currentLineHeight;
                    }
                }
            }

            addLog("바이너리 마감 스트림 스트리밍 배출 중...");
            doc.save("판례모음_" + new Date().toISOString().slice(0,10) + ".pdf");
            showToast("가독성이 극대화된 PDF 판례집 다운로드가 완료되었습니다!");
        } catch (error) {
            addLog("❌ PDF 최종 결합 치명적 실패: " + error.message, 'error');
        }
    }
</script>
