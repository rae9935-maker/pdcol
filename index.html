<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>판례 검색기</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
* {
box-sizing: border-box;
}
body {
margin: 0;
padding: 0;
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
height: 100vh;
background-color: #fafafa;
color: #202124;
}
.search-container {
text-align: center;
width: 100%;
max-width: 650px;
padding: 30px;
background: #ffffff;
border-radius: 16px;
box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
margin-top: -20px;
}

.main-title {
font-size: 32px;
font-weight: 700;
color: #1a73e8;
margin-bottom: 25px;
letter-spacing: -0.5px;
}

.oc-container {
margin-bottom: 15px;
text-align: right;
}
.oc-input {
padding: 8px 12px;
font-size: 12px;
border: 1px solid #dadce0;
border-radius: 6px;
width: 220px;
outline: none;
transition: border-color 0.2s;
}
.oc-input:focus {
border-color: #1a73e8;
}

.search-box-wrapper {
position: relative;
width: 100%;
}
.search-box {
width: 100%;
padding: 16px 24px;
font-size: 16px;
border: 1px solid #dadce0;
border-radius: 28px;
outline: none;
background-color: #fff;
transition: all 0.2s;
}
.search-box:focus, .search-box:hover {
box-shadow: 0 2px 8px rgba(32,33,36,0.15);
border-color: rgba(0,0,0,0);
}
.btn-container {
margin-top: 20px;
}
button {
background-color: #f1f3f4;
border: 1px solid #f1f3f4;
border-radius: 24px;
color: #3c4043;
font-size: 14px;
font-weight: 500;
margin: 8px 6px;
padding: 12px 24px;
cursor: pointer;
transition: all 0.15s;
}
button:hover {
background-color: #e8eaed;
border-color: #dadce0;
color: #202124;
}

.log-box {
margin-top: 25px;
padding: 15px;
background-color: #f8f9fa;
border: 1px solid #e8eaed;
border-radius: 8px;
text-align: left;
font-family: "Courier New", Courier, monospace;
font-size: 13px;
color: #3c4043;
max-height: 180px;
overflow-y: auto;
display: none;
}
.log-line {
margin: 4px 0;
line-height: 1.4;
}
.log-success { color: #137333; font-weight: bold; }
.log-error { color: #c5221f; font-weight: bold; }
.log-info { color: #1a73e8; }

.info-text {
margin-top: 35px;
font-size: 12px;
color: #70757a;
line-height: 1.6;
border-top: 1px solid #f1f3f4;
padding-top: 15px;
}
</style>
</head>
<body>

<div class="search-container">
<div class="main-title">판례 검색기</div>

<div class="oc-container">
<input type="password" id="ocInput" class="oc-input" placeholder="법제처 인증키(oc) 입력 후 엔터" onchange="saveOCKey()">
</div>

<div class="search-box-wrapper">
<input type="text" id="searchInput" class="search-box" placeholder="판례번호를 입력하세요 (여러 개 입력 시 공백으로 구분)" autocomplete="off">
</div>

<div class="btn-container">
<button onclick="handleDownload('txt')">TXT 파일 다운로드</button>
<button onclick="handleDownload('pdf')">PDF 파일 다운로드</button>
</div>

<div id="logBox" class="log-box"></div>

<div class="info-text">
※ 대법원, 하급심, 헌법재판소 판례번호를 인식해 리스트화합니다.<br>
오른쪽 상단에 발급받으신 인증키(oc)를 입력해 두시면 브라우저에 저장됩니다.
</div>
</div>

<script>
// [긴급 에러 추적기] 브라우저 내부에서 자바스크립트가 튕기면 즉시 알림을 띄웁니다.
window.onerror = function(msg, url, lineNo, columnNo, error) {
alert("🚨 브라우저 스크립트 에러 발생!\n내용: " + msg + "\n위치: " + lineNo + "번 줄\n상세: " + (error ? error.message : "없음"));
return false;
};

// 보안 모드에서 localStorage 에러 차단 로직 적용
window.onload = function() {
try {
var savedOC = localStorage.getItem('law_api_oc');
if (savedOC) {
document.getElementById('ocInput').value = savedOC;
}
} catch (e) {
console.log("localStorage 접근 제한 상태");
}
};

function saveOCKey() {
var ocValue = document.getElementById('ocInput').value.trim();
try {
localStorage.setItem('law_api_oc', ocValue);
alert("인증키가 브라우저에 기억되었습니다.");
} catch (e) {
alert("⚠️ 현재 브라우저 보안 설정으로 인해 인증키 자동 저장이 차단되었습니다. 매번 입력이 필요할 수 있습니다.");
}
}

function clearLog() {
var logBox = document.getElementById('logBox');
logBox.innerHTML = '';
logBox.style.display = 'block';
}

function addLog(message, type) {
if (!type) type = 'info';
var logBox = document.getElementById('logBox');
var line = document.createElement('div');
line.className = 'log-line log-' + type;

var timestamp = new Date().toLocaleTimeString();
line.innerText = '[' + timestamp + '] ' + message;

logBox.appendChild(line);
logBox.scrollTop = logBox.scrollHeight;
}

function extractCaseNumbers(text) {
var caseRegex = /\d{2,4}[가-힣]{1,3}\d+/g;
var matches = text.match(caseRegex) || [];
return matches.filter(function(item, pos) {
return matches.indexOf(item) == pos;
});
}

// 하위 호환성을 위해 모든 ?. 문법을 표준 조건문 형식으로 변환
async function fetchCaseTextReal(caseNum) {
var OC = document.getElementById('ocInput').value.trim();
if (!OC) {
throw new Error("우측 상단의 '인증키(oc)' 가 비어 있습니다.");
}

var proxy = "https://api.allorigins.win/raw?url=";
var parser = new DOMParser();

addLog("[" + caseNum + "] 법제처 1차 검색 시작 (일련번호 확인 중)...");
var searchUrl = "https://www.law.go.kr/DRF/lawSearch.do?OC=" + OC + "&target=prec&type=XML&query=" + encodeURIComponent(caseNum);

var searchResponse = await fetch(proxy + encodeURIComponent(searchUrl));
if (!searchResponse.ok) throw new Error("법제처 1차 서버 통신에 실패했습니다.");

var searchText = await searchResponse.text();
var searchDoc = parser.parseFromString(searchText, "text/xml");

var precSeqEl = searchDoc.querySelector("precSeq");
if (!precSeqEl) {
throw new Error("법제처 데이터베이스에 없는 판례번호입니다.");
}
var precSeq = precSeqEl.textContent;
addLog("[" + caseNum + "] 일련번호 확인 완료 (ID: " + precSeq + "). 전문 매칭 시작...", "success");

var detailUrl = "https://www.law.go.kr/DRF/lawService.do?OC=" + OC + "&target=prec&ID=" + precSeq + "&type=XML";
var detailResponse = await fetch(proxy + encodeURIComponent(detailUrl));
if (!detailResponse.ok) throw new Error("법제처 2차 서버(전문 조회) 통신에 실패했습니다.");

var detailText = await detailResponse.text();
var detailDoc = parser.parseFromString(detailText, "text/xml");

var courtNameEl = detailDoc.querySelector("법원명");
var sentenceDateEl = detailDoc.querySelector("선고일자");
var caseNumberEl = detailDoc.querySelector("사건번호");
var caseNameEl = detailDoc.querySelector("사건명");

var courtName = courtNameEl ? courtNameEl.textContent : "";
var sentenceDate = sentenceDateEl ? sentenceDateEl.textContent : "";
var caseNumber = caseNumberEl ? caseNumberEl.textContent : "";
var caseName = caseNameEl ? caseNameEl.textContent : "";

var cleanText = function(str) {
return str ? str.replace(/<[^>]*>/g, '').trim() : "";
};

var s1El = detailDoc.querySelector("판시사항");
var s2El = detailDoc.querySelector("판결요지");
var rEl = detailDoc.querySelector("이유");

var summary1 = cleanText(s1El ? s1El.textContent : "");
var summary2 = cleanText(s2El ? s2El.textContent : "");
var reasons = cleanText(rEl ? rEl.textContent : "");

var fullText = courtName + " " + sentenceDate + " 선고 " + caseNumber + " 판결 [" + caseName + "]\n\n";
if (summary1) fullText += "【판시사항】\n" + summary1 + "\n\n";
if (summary2) fullText += "【판결요지】\n" + summary2 + "\n\n";
if (reasons) fullText += "【이유】\n" + reasons;

addLog("[" + caseNum + "] 본문 추출 및 규격화 성공", "success");
return fullText;
}

async function handleDownload(type) {
clearLog();
var inputData = document.getElementById('searchInput').value;
addLog("입력 데이터 분석 중...");

var caseList = extractCaseNumbers(inputData);

if (caseList.length === 0) {
addLog("⚠️ 인식된 판례번호가 없습니다. 형식을 확인하세요.", "error");
return;
}

addLog("총 [" + caseList.length + "개] 의 판례가 인식되었습니다: " + caseList.join(', '));

var collectedData = [];
for (var i = 0; i < caseList.length; i++) {
var caseNum = caseList[i];
try {
var content = await fetchCaseTextReal(caseNum);
collectedData.push({ title: caseNum, content: content });
} catch (err) {
addLog("❌ [" + caseNum + "] 실패: " + err.message, "error");
}
}

if (collectedData.length === 0) {
addLog("정상적으로 처리된 판례가 없어 파일을 생성하지 않습니다.", "error");
return;
}

if (type === 'txt') {
downloadTXT(collectedData);
} else if (type === 'pdf') {
await downloadPDF(collectedData);
}
}

function downloadTXT(data) {
addLog("TXT 파일 포맷팅 구성 중...");
var output = "";
for (var i = 0; i < data.length; i++) {
output += data[i].content;
if (i < data.length - 1) {
output += "\n\n----------\n\n";
}
}

var blob = new Blob([output], { type: "text/plain;charset=utf-8" });
var url = URL.createObjectURL(blob);
var a = document.createElement("a");
a.href = url;
a.download = "판례모음_" + new Date().toISOString().slice(0,10) + ".txt";
a.click();
URL.revokeObjectURL(url);
addLog("🎉 TXT 파일 다운로드 완료!", "success");
}

async function fetchFontAsBase64(url) {
addLog("구글 오픈소스 서체 서버 연결 시도 중...");
try {
var response = await fetch(url);
if(!response.ok) throw new Error("서체 다운로드 실패");
var blob = await response.blob();
return new Promise(function(resolve, reject) {
var reader = new FileReader();
reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
reader.onerror = function() { reject(new Error("바이너리 변환 실패")); };
reader.readAsDataURL(blob);
});
} catch (e) {
throw new Error("서체 허브 통신 지연 (" + e.message + ")");
}
}

async function downloadPDF(data) {
addLog("PDF 생성 프로세스 가동...");
try {
if (!window.jspdf) {
throw new Error("jsPDF 라이브러리가 유실되었습니다. 네트워크 연결 혹은 광고 차단 앱 상태를 확인하세요.");
}

var fontUrl = "https://cdn.jsdelivr.net/gh/googlefonts/noto-fonts@main/hinted/ttf/NotoSansKR/NotoSansKR-Regular.ttf";
var fontBase64 = await fetchFontAsBase64(fontUrl);
addLog("구글 서체 빌드 완료. 레이아웃 인젝션 시작...", "success");

var jsPDF = window.jspdf.jsPDF;
var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

doc.addFileToVFS("GoogleSansKR.ttf", fontBase64);
doc.addFont("GoogleSansKR.ttf", "GoogleSansKR", "normal");
doc.setFont("GoogleSansKR");

var margin = 10;
var pageWidth = 210;
var pageHeight = 297;
var printWidth = pageWidth - (margin * 2);
var bottomLimit = pageHeight - margin;

var fontSizeTitle = 15;
var fontSizeBody = 11;

var lineHeightTitle = fontSizeTitle * 0.3528 * 2.0;
var lineHeightBody = fontSizeBody * 0.3528 * 2.0;

for (var i = 0; i < data.length; i++) {
var item = data[i];
if (i > 0) doc.addPage();
addLog("[" + item.title + "] PDF 도면 배치 중 (A4, 마진 10mm, 행간 2.0)...");

var currentY = margin + 5;

doc.setFontSize(fontSizeTitle);
doc.text(item.title, margin, currentY);
currentY += lineHeightTitle + 3;

doc.setFontSize(fontSizeBody);
var paragraphs = item.content.split('\n');

for (var j = 0; j < paragraphs.length; j++) {
var para = paragraphs[j];
if (para.trim() === "") {
currentY += lineHeightBody;
continue;
}

var lines = doc.splitTextToSize(para, printWidth);
for (var k = 0; k < lines.length; k++) {
if (currentY > bottomLimit) {
doc.addPage();
currentY = margin + 10;
}
doc.text(lines[k], margin, currentY);
currentY += lineHeightBody;
}
currentY += lineHeightBody;
}
}

addLog("PDF 파일 인코딩 및 스트림 마감 중...");
doc.save("판례모음_" + new Date().toISOString().slice(0,10) + ".pdf");
addLog("🎉 PDF 파일 다운로드 완료!", "success");
} catch (error) {
addLog("❌ PDF 최종 결합 실패: " + error.message, 'error');
alert("PDF 처리 에러: " + error.message);
}
}
</script>

</body>
</html>
