<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>판례 검색기</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        /* 업로드된 구글 산스 정적 폰트 패키지를 웹 UI 전체에 다이내믹 바인딩 */
        @font-face {
            font-family: 'Google Sans Custom';
            src: url('./GoogleSans-Regular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Google Sans Custom';
            src: url('./GoogleSans-Bold.ttf') format('truetype');
            font-weight: bold;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
        }
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Google Sans Custom', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #fafafa;
            color: #202124;
        }
        
        .search-container {
            text-align: center;
            width: 100%;
            max-width: 650px;
            padding: 30px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            margin-top: -20px;
        }
        
        .main-title {
            font-size: 32px;
            font-weight: 700;
            color: #1a73e8;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }

        .oc-container {
            margin-bottom: 15px;
            text-align: right;
        }
        .oc-input {
            padding: 8px 12px;
            font-size: 12px;
            border: 1px solid #dadce0;
            border-radius: 6px;
            width: 220px;
            outline: none;
            transition: border-color 0.2s;
        }
        .oc-input:focus {
            border-color: #1a73e8;
        }

        .search-box-wrapper {
            position: relative;
            width: 100%;
        }
        .search-box {
            width: 100%;
            padding: 16px 24px;
            font-size: 16px;
            border: 1px solid #dadce0;
            border-radius: 28px;
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
        }
        .search-box:focus, .search-box:hover {
            box-shadow: 0 2px 8px rgba(32,33,36,0.15);
            border-color: rgba(0,0,0,0);
        }
        .btn-container {
            margin-top: 20px;
        }
        button {
            background-color: #f1f3f4;
            border: 1px solid #f1f3f4;
            border-radius: 24px;
            color: #3c4043;
            font-size: 14px;
            font-weight: 500;
            margin: 8px 6px;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.15s;
        }
        button:hover {
            background-color: #e8eaed;
            border-color: #dadce0;
            color: #202124;
        }
        
        .log-wrapper {
            margin-top: 25px;
            text-align: left;
            display: none;
        }
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            padding: 0 4px;
        }
        .log-title {
            font-size: 12px;
            font-weight: bold;
            color: #5f6368;
        }
        .copy-btn {
            margin: 0;
            padding: 5px 12px;
            font-size: 11px;
            background-color: #ffffff;
            border: 1px solid #dadce0;
            border-radius: 6px;
            color: #1a73e8;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.15s;
        }
        .copy-btn:hover {
            background-color: #f8f9fa;
            border-color: #1a73e8;
        }

        .log-box {
            padding: 15px;
            background-color: #f8f9fa;
            border: 1px solid #e8eaed;
            border-radius: 8px;
            font-family: "Courier New", Courier, monospace;
            font-size: 13px;
            color: #3c4043;
            max-height: 220px;
            overflow-y: auto;
        }
        .log-line {
            margin: 4px 0;
            line-height: 1.4;
            word-break: break-all;
        }
        .log-success { color: #137333; font-weight: bold; }
        .log-error { color: #c5221f; font-weight: bold; }
        .log-info { color: #1a73e8; }
        .log-warn { color: #b06000; font-weight: bold; }

        .info-text {
            margin-top: 35px;
            font-size: 12px;
            color: #70757a;
            line-height: 1.6;
            border-top: 1px solid #f1f3f4;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="search-container">
    <div class="main-title">판례 검색기</div>
    
    <div class="oc-container">
        <input type="password" id="ocInput" class="oc-input" placeholder="법제처 인증키(oc) 입력 후 엔터" onchange="saveOCKey()">
    </div>

    <div class="search-box-wrapper">
        <input type="text" id="searchInput" class="search-box" placeholder="판례번호를 입력하세요 (여러 개 입력 시 공백으로 구분)" autocomplete="off">
    </div>
    
    <div class="btn-container">
        <button onclick="handleDownload('txt')">TXT 파일 다운로드</button>
        <button onclick="handleDownload('pdf')">PDF 파일 다운로드</button>
    </div>
    
    <div id="logWrapper" class="log-wrapper">
        <div class="log-header">
            <span class="log-title">실시간 구동 로그</span>
            <button class="copy-btn" onclick="copyLog()">로그 복사</button>
        </div>
        <div id="logBox" class="log-box"></div>
    </div>

    <div class="info-text">
        ※ 대법원, 하급심, 헌법재판소 판례번호를 인식해 리스트화합니다.<br>
        오른쪽 상단에 발급받으신 인증키(oc)를 입력해 두시면 브라우저에 저장됩니다.
    </div>
</div>

<script>
    window.onerror = function(msg, url, lineNo) {
        addLog("시스템 예외 감지: " + msg + " (Line: " + lineNo + ")", "error");
        return false;
    };

    window.onload = function() {
        try {
            var savedOC = localStorage.getItem('law_api_oc');
            if (savedOC) {
                document.getElementById('ocInput').value = savedOC;
            }
        } catch (e) {}
    };

    function saveOCKey() {
        var ocValue = document.getElementById('ocInput').value.trim();
        try {
            localStorage.setItem('law_api_oc', ocValue);
            alert("인증키가 브라우저에 저장되었습니다.");
        } catch (e) {}
    }

    function clearLog() {
        var logBox = document.getElementById('logBox');
        var logWrapper = document.getElementById('logWrapper');
        logBox.innerHTML = '';
        logWrapper.style.display = 'block';
    }

    function addLog(message, type) {
        if (!type) type = 'info';
        var logBox = document.getElementById('logBox');
        var line = document.createElement('div');
        line.className = 'log-line log-' + type;
        var timestamp = new Date().toLocaleTimeString();
        line.innerText = '[' + timestamp + '] ' + message;
        logBox.appendChild(line);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function copyLog() {
        var logBox = document.getElementById('logBox');
        if (!logBox) return;
        var logText = logBox.innerText;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(logText).then(function() {
                alert("로그가 클립보드에 복사되었습니다!");
            }).catch(function() {
                fallbackCopy(logText);
            });
        } else {
            fallbackCopy(logText);
        }
    }

    function fallbackCopy(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            alert("로그가 클립보드에 복사되었습니다!");
        } catch (err) {
            alert("복사에 실패했습니다. 직접 선택하여 복사해 주세요.");
        }
        document.body.removeChild(textarea);
    }

    function extractCaseNumbers(text) {
        var caseRegex = /\d{2,4}[가-힣]{1,3}\d+/g;
        var matches = text.match(caseRegex) || [];
        return matches.filter(function(item, pos) {
            return matches.indexOf(item) == pos;
        });
    }

    async function fetchWithFallback(targetUrl, caseNum) {
        var proxies = [
            "https://corsproxy.io/?",
            "https://api.codetabs.com/v1/proxy?url=",
            "https://api.allorigins.win/raw?url="
        ];
        
        for (var i = 0; i < proxies.length; i++) {
            var currentProxy = proxies[i];
            try {
                var finalUrl = currentProxy + encodeURIComponent(targetUrl);
                var controller = new AbortController();
                var id = setTimeout(function() { controller.abort(); }, 6000);
                
                var res = await fetch(finalUrl, { signal: controller.signal });
                clearTimeout(id);
                if (res.ok) return res;
            } catch (e) {}
        }
        throw new Error("모든 우회 통신망이 법제처 서버와 연결하는 데 실패했습니다.");
    }

    function getXmlTagValue(text, tagName) {
        var regex = new RegExp("<" + tagName + "[^>]*>([\\s\\S]*?)<\/" + tagName + ">", "i");
        var match = text.match(regex);
        if (match && match[1]) {
            return match[1].replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1").trim();
        }
        return "";
    }

    // [최고도화 정밀 개행 변환 엔진] 유저 예시를 분석하여 완벽한 줄바꿈 분리를 처리하는 코어 유닛
    function formatCaseContent(text) {
        if (!text) return "";
        
        // 1. 문서 전체의 다중 연속 공백 파편 제거 및 단일화
        var formatted = text.replace(/[ \t]+/g, ' ');
        
        // 2. 내부 공백 유무에 상관없이 모든 【 】 형태의 대형 표제어 감지 후 앞뒤로 완벽한 빈 줄 독립 개행 배치
        formatted = formatted.replace(/\s*(【\s*[^】]+\s*】)\s*/g, "\n\n$1\n\n");
        
        // 3. 판시사항/판결요지 내부의 항목 번호([1], [2]) 직전 강제 개행 배치 처리
        formatted = formatted.replace(/([^\n])\s*(\[(\d+)\])/g, "$1\n$2");
        
        // 4. 본문 세부 목차 번호 자동 개행 및 여백 확보 (1., 2. / 가., 나. / (1), (2) 등 전방위 대응)
        formatted = formatted.replace(/([^\n])\s*(\d+\.\s+상고이유|\d+\.\s+먼저|\d+\.\s+)/g, "$1\n\n$2");
        formatted = formatted.replace(/([^\n])\s*([가-힣]\.\s+)/g, "$1\n\n$2");
        formatted = formatted.replace(/([^\n])\s*(\((\d+)\)\s+)/g, "$1\n\n$2");
        formatted = formatted.replace(/([^\n])\s*(그러므로\s+상고를\s+기각하고)/g, "$1\n\n$2");
        
        // 5. [대법관 ...의 보충의견] 및 판결문 하단 대법관 명단 구역화 여백 처리
        formatted = formatted.replace(/([^\n])\s*(\[대법관[^\]]+의견\])/g, "$1\n\n$2\n\n");
        formatted = formatted.replace(/([^\n])\s*((대법관|대법원장)\s+[가-힣])/g, "$1\n\n$2");
        formatted = formatted.replace(/(주문과 같이 판결한다\.)(\s*)(대법관|대법원장)/g, "$1\n\n$3");

        // 6. 누적된 다중 개행을 최종 정돈하되 가독성 여백(\n\n) 규격 통일
        formatted = formatted.replace(/\n{3,}/g, "\n\n");
        
        return formatted.trim();
    }

    async function fetchCaseTextReal(caseNum) {
        var OC = document.getElementById('ocInput').value.trim();
        if (!OC) throw new Error("우측 상단의 '인증키(oc)' 가 비어 있습니다.");

        var searchUrl = "https://www.law.go.kr/DRF/lawSearch.do?OC=" + OC + "&target=prec&type=XML&query=" + encodeURIComponent(caseNum);
        var searchResponse = await fetchWithFallback(searchUrl, caseNum);
        
        var arrayBuffer = await searchResponse.arrayBuffer();
        var utf8Decoder = new TextDecoder('utf-8');
        var searchText = utf8Decoder.decode(arrayBuffer);
        
        if (!searchText.includes("PrecSearch") && !searchText.includes("precSearch")) {
            var eucKrDecoder = new TextDecoder('euc-kr');
            searchText = eucKrDecoder.decode(arrayBuffer);
        }
        
        var precBlocks = searchText.match(/<prec[^>]*>([\s\S]*?)<\/prec>/gi) || [];
        var precSeq = "";
        var cleanTargetCase = caseNum.replace(/\s+/g, "");
        
        addLog("[" + caseNum + "] 검색 목록 매칭 파싱 시작...");
        
        for (var i = 0; i < precBlocks.length; i++) {
            var block = precBlocks[i];
            var blockCaseNum = (getXmlTagValue(block, "사건번호") || getXmlTagValue(block, "caseNumber")).replace(/\s+/g, "");
            if (blockCaseNum === cleanTargetCase) {
                precSeq = getXmlTagValue(block, "precSeq") || getXmlTagValue(block, "판례일련번호");
                if (precSeq) break;
            }
        }
        
        if (!precSeq && precBlocks.length > 0) {
            precSeq = getXmlTagValue(precBlocks[0], "precSeq") || getXmlTagValue(precBlocks[0], "판례일련번호");
        }
        
        if (!precSeq) {
            var errMsg = getXmlTagValue(searchText, "errMsg");
            if (errMsg) throw new Error("법제처 리포트오류: " + errMsg);
            throw new Error("판례 식별 정보를 파싱하지 못했습니다.");
        }

        // [교정 포인트] 변수 OC 바인딩 동적 연결로 수정완료
        var detailUrl = "https://www.law.go.kr/DRF/lawService.do?OC=" + OC + "&target=prec&ID=" + precSeq + "&type=XML";
        var detailResponse = await fetchWithFallback(detailUrl, caseNum);
        
        var detailBuffer = await detailResponse.arrayBuffer();
        var detailText = utf8Decoder.decode(detailBuffer);
        
        if (!detailText.includes("법원명") && !detailText.includes("사건번호")) {
            var eucKrDecoder = new TextDecoder('euc-kr');
            detailText = eucKrDecoder.decode(detailBuffer);
        }

        var courtName = getXmlTagValue(detailText, "법원명");
        var sentenceDate = getXmlTagValue(detailText, "선고일자");
        var caseNumber = getXmlTagValue(detailText, "사건번호");
        var caseName = getXmlTagValue(detailText, "사건명");
        
        var cleanText = function(str) {
            if (!str) return "";
            return str.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ').trim();
        };

        var summary1 = cleanText(getXmlTagValue(detailText, "판시사항"));
        var summary2 = cleanText(getXmlTagValue(detailText, "판결요지"));
        
        // 전방위 역추적 레이어를 통한 본문 포착 가동
        var bodyTags = ["전문", "판결문", "이유", "주문", "본문", "내용", "전문내용"];
        var textBody = "";
        for (var t = 0; t < bodyTags.length; t++) {
            var extractedValue = cleanText(getXmlTagValue(detailText, bodyTags[t]));
            if (extractedValue && extractedValue.length > textBody.length) {
                textBody = extractedValue;
            }
        }

        if (!textBody || textBody.length < 150) {
            var cdataRegex = /<!\[CDATA\[([\s\S]*?)\]\]>/gi;
            var cdataMatch;
            var longestCdata = "";
            while ((cdataMatch = cdataRegex.exec(detailText)) !== null) {
                var cdataContent = cleanText(cdataMatch[1]);
                if (cdataContent !== summary1 && cdataContent !== summary2 && cdataContent.length > longestCdata.length) {
                    longestCdata = cdataContent;
                }
            }
            if (longestCdata.length > textBody.length) {
                textBody = longestCdata;
            }
        }

        // 헤더 3줄 개행 정돈 배치
        var finalCourtHeader = courtName + " " + sentenceDate + " 선고 \n" + caseNumber + " 판결 \n[" + caseName + "]\n";
        var finalSummary1 = summary1 ? "【판시사항】\n" + summary1 : "";
        var finalSummary2 = summary2 ? "【판결요지】\n" + summary2 : "";
        var finalBodyText = textBody ? textBody : "【이유】\n(※ 본 판례는 법제처 Open API 시스템 자체에서 '이유' 전문 조회를 제공하지 않는 판례 데이터 항목입니다.)";

        var compiledText = finalCourtHeader + "\n" + finalSummary1 + "\n" + finalSummary2 + "\n" + finalBodyText;
        var perfectFormattedText = formatCaseContent(compiledText);

        addLog("[" + caseNum + "] 모든 본문 데이터 결합 및 최적화 개행 완료", "success");
        return perfectFormattedText;
    }

    async function handleDownload(type) {
        clearLog();
        var inputData = document.getElementById('searchInput').value;
        addLog("입력 판례 데이터 분석 파싱 중...");
        
        var caseList = extractCaseNumbers(inputData);
        if (caseList.length === 0) {
            addLog("⚠️ 유효한 사건번호 조합이 감지되지 않았습니다.", "error");
            return;
        }

        addLog("판례 수집 큐(Queue) 등록 [" + caseList.length + "개]: " + caseList.join(', '));

        var collectedData = [];
        for (var i = 0; i < caseList.length; i++) {
            var caseNum = caseList[i];
            try {
                var content = await fetchCaseTextReal(caseNum);
                collectedData.push({ title: caseNum, content: content });
            } catch (err) {
                addLog("❌ [" + caseNum + "] 수집 실패 원인: " + err.message, "error");
            }
        }

        if (collectedData.length === 0) {
            addLog("가용한 문서 파일 풀이 비어있어 빌드를 중단합니다.", "error");
            return;
        }

        if (type === 'txt') downloadTXT(collectedData);
        else if (type === 'pdf') await downloadPDF(collectedData);
    }

    function downloadTXT(data) {
        addLog("TXT 파일 조립 레이아웃 구성 중...");
        var output = "";
        for (var i = 0; i < data.length; i++) {
            output += data[i].content;
            if (i < data.length - 1) output += "\n\n----------\n\n";
        }

        var blob = new Blob(["\uFEFF" + output], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "판례모음_" + new Date().toISOString().slice(0,10) + ".txt";
        a.click();
        URL.revokeObjectURL(url);
        addLog("🎉 TXT 서식 파일 다운로드가 정상 완료되었습니다.", "success");
    }

    async function fetchFontAsBase64(url) {
        try {
            var response = await fetch(url);
            if(!response.ok) return null;
            var blob = await response.blob();
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
                reader.onerror = function() { resolve(null); };
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            return null;
        }
    }

    async function downloadPDF(data) {
        addLog("PDF 컴파일러 런타임 가동 및 저장소 서체 로드 중...");
        try {
            var fontBase64Regular = await fetchFontAsBase64("./GoogleSans-Regular.ttf");
            var fontBase64Bold = await fetchFontAsBase64("./GoogleSans-Bold.ttf");

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            if (fontBase64Regular) {
                doc.addFileToVFS("GoogleSans-Regular.ttf", fontBase64Regular);
                doc.addFont("GoogleSans-Regular.ttf", "GoogleSans", "normal");
            }
            if (fontBase64Bold) {
                doc.addFileToVFS("GoogleSans-Bold.ttf", fontBase64Bold);
                doc.addFont("GoogleSans-Bold.ttf", "GoogleSans", "bold");
            }

            if (fontBase64Regular || fontBase64Bold) {
                doc.setFont("GoogleSans", "normal");
                addLog("구글 고품질 정적 서체 패키지(Regular & Bold) 결합 완료.", "success");
            } else {
                addLog("⚠️ 저장소 내부 서체 로드 실패로 시스템 기본 폰트로 대체 구동합니다.", "warn");
            }

            var margin = 10;
            var pageWidth = 210;
            var pageHeight = 297;
            var printWidth = pageWidth - (margin * 2);
            var bottomLimit = pageHeight - margin;

            var fontSizeTitle = 15;
            var fontSizeBody = 11;
            
            var lineHeightTitle = fontSizeTitle * 0.3528 * 2.0;
            var lineHeightBody = fontSizeBody * 0.3528 * 2.0;

            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                if (i > 0) doc.addPage();
                addLog("[" + item.title + "] 고급 독해용 레이아웃 구성 및 도면 드로잉 중...");

                var currentY = margin + 5;

                if (fontBase64Bold) doc.setFont("GoogleSans", "bold");
                doc.setFontSize(fontSizeTitle);
                doc.text(item.title, margin, currentY);
                currentY += lineHeightTitle + 4;

                if (fontBase64Regular) doc.setFont("GoogleSans", "normal");
                doc.setFontSize(fontSizeBody);
                
                var paragraphs = item.content.split('\n');

                for (var j = 0; j < paragraphs.length; j++) {
                    var para = paragraphs[j];
                    if (para.trim() === "") {
                        currentY += lineHeightBody;
                        continue;
                    }

                    // PDF 내부 굵은 서체 자동 스캔 범위 고도화 확장 바인딩
                    var isHeader = para.trim().startsWith("【") || para.trim().startsWith("[") || para.trim().match(/^\d+\.\s+상고이유/) || para.trim().match(/^[가-힣]\.\s+/) || para.trim().startsWith("대법관") || para.trim().startsWith("대법원장");
                    if (isHeader && fontBase64Bold) {
                        doc.setFont("GoogleSans", "bold");
                    } else if (fontBase64Regular) {
                        doc.setFont("GoogleSans", "normal");
                    }

                    var lines = doc.splitTextToSize(para, printWidth);
                    for (var k = 0; k < lines.length; k++) {
                        if (currentY > bottomLimit) {
                            doc.addPage();
                            currentY = margin + 10;
                        }
                        doc.text(lines[k], margin, currentY);
                        currentY += lineHeightBody;
                    }
                    currentY += lineHeightBody; 
                }
            }

            addLog("바이너리 마감 스트림 스트리밍 배출 중...");
            doc.save("판례모음_" + new Date().toISOString().slice(0,10) + ".pdf");
            addLog("🎉 가독성이 극대화된 PDF 판례집 다운로드가 완료되었습니다!", "success");
        } catch (error) {
            addLog("❌ PDF 최종 결합 치명적 실패: " + error.message, 'error');
        }
    }
</script>

</body>
</html>
