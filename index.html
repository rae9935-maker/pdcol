<body>

<div class="search-container">
    <div class="main-title">판례 검색기</div>
    
    <div class="oc-container">

    <div id="logWrapper" class="log-wrapper">

        ※ 임의의 텍스트 속에서 법원 사건번호 양식을 자동으로 똑똑하게 인식하여 리스트화합니다.<br>
        오른쪽 상단에 발급받으신 인증키(oc)를 입력해 두시면 브라우저에 저장됩니다.
    </div>
</div>

<div id="toast"></div>

<script>
    window.onerror = function(msg, url, lineNo) {
        addLog("시스템 예외 감지: " + msg + " (Line: " + lineNo + ")", "error");
        return false;
    };

    function showToast(message) {
        var toast = document.getElementById("toast");
        toast.innerText = message;
        toast.style.display = "block";
        setTimeout(function() {
            toast.style.display = "none";
        }, 3000);
    }

    window.onload = function() {
        try {
            var savedOC = localStorage.getItem('law_api_oc');
            if (savedOC) {
                document.getElementById('ocInput').value = savedOC;
            }
        } catch (e) {}
    };

    function saveOCKey() {
        var ocValue = document.getElementById('ocInput').value.trim();
        try {
            localStorage.setItem('law_api_oc', ocValue);
            showToast("인증키가 브라우저에 저장되었습니다.");
        } catch (e) {}
    }

    function clearLog() {
        var logBox = document.getElementById('logBox');
        var logWrapper = document.getElementById('logWrapper');
        logBox.innerHTML = '';
        logWrapper.style.display = 'block';
    }

    function addLog(message, type) {
        if (!type) type = 'info';
        var logBox = document.getElementById('logBox');
        var line = document.createElement('div');
        line.className = 'log-line log-' + type;
        var timestamp = new Date().toLocaleTimeString();
        line.innerText = '[' + timestamp + '] ' + message;
        logBox.appendChild(line);
        logBox.scrollTop = logBox.scrollHeight;
    }

    function copyLog() {
        var logBox = document.getElementById('logBox');
        if (!logBox) return;
        var logText = logBox.innerText;

        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(logText).then(function() {
                showToast("로그가 클립보드에 복사되었습니다!");
            }).catch(function() {
                fallbackCopy(logText);
            });
        } else {
            fallbackCopy(logText);
        }
    }

    function fallbackCopy(text) {
        var textarea = document.createElement("textarea");
        textarea.value = text;
        textarea.style.position = "fixed";
        document.body.appendChild(textarea);
        textarea.select();
        try {
            document.execCommand("copy");
            showToast("로그가 클립보드에 복사되었습니다!");
        } catch (err) {
            showToast("복사에 실패했습니다. 직접 선택하여 복사해 주세요.");
        }
        document.body.removeChild(textarea);
    }

    // [★ 초정밀 다각도 사건번호 추출기]
    function extractCaseNumbers(text) {
        if (!text) return [];
        
        var caseRegex = /\d{2,4}\s*[가-힣]{1,3}\s*\d+/g;
        var matches = text.match(caseRegex) || [];
        
        var cleanedMatches = matches.map(function(item) {
            return item.replace(/\s+/g, ""); 
        });
        
        return cleanedMatches.filter(function(item, pos) {
            return cleanedMatches.indexOf(item) === pos;
        });
    }

    // [★ 네트워크 버스트 타임아웃 복원 재시도기] 지수 백오프와 오류 타입화 레이어 포함
    async function fetchWithFallback(targetUrl, caseNum) {
        var proxies = [
            "https://corsproxy.io/?",
            "https://api.codetabs.com/v1/proxy?url=",
            "https://api.allorigins.win/raw?url="
        ];
        
        var maxRetries = 3;
        var retryDelay = 800; // ms

        for (var i = 0; i < proxies.length; i++) {
            var currentProxy = proxies[i];
            var proxyName = i === 0 ? "고속망" : i === 1 ? "기본망" : "비상망";
            
            for (var attempt = 1; attempt <= maxRetries; attempt++) {
                try {
                    var finalUrl = currentProxy + encodeURIComponent(targetUrl);
                    var controller = new AbortController();
                    var id = setTimeout(function() { controller.abort(); }, 6000);
                    
                    var res = await fetch(finalUrl, { signal: controller.signal });
                    clearTimeout(id);
                    if (res.ok) return res;
                    
                } catch (e) {
                    if (attempt === maxRetries) {
                        // 모든 시도 끝에 이 프록시에서 실패하면 다음 프록시로 넘어감
                        break;
                    }
                    var nextDelay = retryDelay * Math.pow(1.5, attempt);
                    addLog("⚠️ [" + caseNum + "] " + proxyName + " 통신 정체로 재접속 중... (" + attempt + "/" + maxRetries + "회)", "warn");
                    await new Promise(function(resolve) { setTimeout(resolve, nextDelay); });
                }
            }
        }
        throw { type: "NETWORK_ERROR", message: "프록시 통신망 대역폭 초과 및 타임아웃이 발생했습니다." };
    }

    function getXmlTagValue(text, tagName) {
        var regex = new RegExp("<" + tagName + "[^>]*>([\\s\\S]*?)<\/" + tagName + ">", "i");
        var match = text.match(regex);
        if (match && match[1]) {
            return match[1].replace(/<!\[CDATA\[([\s\S]*?)\]\]>/g, "$1").trim();
        }
        return "";
    }

    function getCoreCaseNumber(str) {
        if (!str) return "";
        var normalized = str.replace(/\s+/g, "");
        var matchesNorm = normalized.match(/\d{2,4}[가-힣]{1,3}\d+/);
        return matchesNorm ? matchesNorm[0] : normalized.replace(/[^가-힣0-9]/g, "");
    }

    // [정밀 개행 변환 엔진]
    function formatCaseContent(text) {
        if (!text) return "";
        
        var formatted = text.replace(/[ \t]+/g, ' ');
        
        formatted = formatted.replace(/(\d{1,4})\s*\.\s*(\d{1,2})\s*\.\s*(\d{1,2})\s*\./g, "$1〔DOT〕$2〔DOT〕$3〔DOT〕");
        formatted = formatted.replace(/(\d{1,4})\s*\.\s*(\d{1,2})\s*\./g, "$1〔DOT〕$2〔DOT〕");
        formatted = formatted.replace(/(\b\d{1,2})\s*\.\s*(\d{1,2})\s*\./g, "$1〔DOT〕$2〔DOT〕");
        
        formatted = formatted.replace(/\s*(【\s*[^】]+\s*】)\s*/g, "\n\n$1\n\n");
        formatted = formatted.replace(/([^\n])\s*(\[(\d+)\])/g, "$1\n$2");
        
        formatted = formatted.replace(/(^|\s)(\d+\.\s+상고이유|\d+\.\s+먼저|\d+\.\s+)/g, "$1\n\n$2");
        formatted = formatted.replace(/(^|\s)([가-하]\.\s+)/g, "$1\n\n$2");
        formatted = formatted.replace(/(^|\s)(\((\d+)\)\s+)/g, "$1\n\n$2");
        formatted = formatted.replace(/(^|\s)(그러므로\s+상고를\s+기각하고)/g, "$1\n\n$2");
        
        formatted = formatted.replace(/([^\n])\s*(\[대법관[^\]]+의견\])/g, "$1\n\n$2\n\n");
        formatted = formatted.replace(/(^|\s)((대법관|대법원장)\s+[가-힣])/g, "$1\n\n$2");
        formatted = formatted.replace(/(주문과 같이 판결한다\.)(\s*)(대법관|대법원장)/g, "$1\n\n$3");

        formatted = formatted.replace(/〔DOT〕/g, ".");
        formatted = formatted.replace(/\n{3,}/g, "\n\n");
        
        return formatted.trim();
    }

    var cleanText = function(str) {
        if (!str) return "";
        var cleaned = str.replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ');
        cleaned = cleaned.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
        cleaned = cleaned.replace(/\n\s*\n/g, '〔P_BREAK〕');
        cleaned = cleaned.replace(/([가-힣])\n(다|라|까)\b/g, "$1$2");
        cleaned = cleaned.replace(/\n/g, ' ');
        cleaned = cleaned.replace(/〔P_BREAK〕/g, '\n\n');
        cleaned = cleaned.replace(/[ \t]+/g, ' ');
        return cleaned.trim();
    };

    // [★ 초정형 하이브리드 수집 파이프라인]
    async function fetchCaseTextReal(caseNum) {
        var OC = document.getElementById('ocInput').value.trim();
        if (!OC) throw { type: "KEY_ERROR", message: "우측 상단의 '인증키(oc)' 가 비어 있습니다." };

        var isDetc = caseNum.includes("헌");
        var targetType = isDetc ? "detc" : "prec";
        
        var searchUrl = "https://www.law.go.kr/DRF/lawSearch.do?OC=" + OC + "&target=" + targetType + "&type=XML&query=" + encodeURIComponent(caseNum);
        if (isDetc) {
            searchUrl += "&mobileYn=Y";
        }
        var searchResponse = await fetchWithFallback(searchUrl, caseNum);
        
        var arrayBuffer = await searchResponse.arrayBuffer();
        var utf8Decoder = new TextDecoder('utf-8');
        var searchText = utf8Decoder.decode(arrayBuffer);
        
        if (!searchText.includes("PrecSearch") && !searchText.includes("precSearch") && !searchText.includes("DetcSearch") && !searchText.includes("detcSearch")) {
            var eucKrDecoder = new TextDecoder('euc-kr');
            searchText = eucKrDecoder.decode(arrayBuffer);
        }
        
        var blockTag = isDetc ? "detc" : "prec";
        var precBlocks = searchText.match(new RegExp("<" + blockTag + "[^>]*>([\\s\\S]*?)<\/" + blockTag + ">", "gi")) || [];
        var precSeq = "";
        var cleanTargetCase = getCoreCaseNumber(caseNum);
        var foundList = [];
        
        addLog("[" + caseNum + "] 검색 목록 매칭 파싱 시작...");
        
        for (var i = 0; i < precBlocks.length; i++) {
            var block = precBlocks[i];
            var blockCaseNumRaw = getXmlTagValue(block, "사건번호") || getXmlTagValue(block, "caseNumber") || "";
            var blockCaseNum = getCoreCaseNumber(blockCaseNumRaw);
            var blockSeq = "";
            if (isDetc) {
                blockSeq = getXmlTagValue(block, "헌재결정례일련번호") || getXmlTagValue(block, "detcSeq") || getXmlTagValue(block, "detcId") || "";
            } else {
                blockSeq = getXmlTagValue(block, "precSeq") || getXmlTagValue(block, "판례일련번호") || "";
            }
            
            if (blockCaseNumRaw) {
                foundList.push(blockCaseNumRaw);
            }
            
            if (blockCaseNum === cleanTargetCase) {
                precSeq = blockSeq;
                if (precSeq) {
                    var typeLabel = isDetc ? "헌법재판소 결정례" : "대법원 판례";
                    addLog("[" + caseNum + "] 100% 동일한 " + typeLabel + " 식별 일치 성공 (ID: " + precSeq + ")", "success");
                    break;
                }
            }
        }
        
        if (!precSeq && precBlocks.length > 0) {
            var firstBlock = precBlocks[0];
            if (isDetc) {
                precSeq = getXmlTagValue(firstBlock, "헌재결정례일련번호") || getXmlTagValue(firstBlock, "detcSeq") || getXmlTagValue(firstBlock, "detcId") || "";
            } else {
                precSeq = getXmlTagValue(firstBlock, "precSeq") || getXmlTagValue(firstBlock, "판례일련번호") || "";
            }
        }
        
        if (!precSeq) {
            var errMsg = getXmlTagValue(searchText, "errMsg");
            if (errMsg) throw { type: "KEY_ERROR", message: "법제처 API 오류 리포트: " + errMsg };
            
            var targetLabel = isDetc ? "헌법재판소 결정례" : "대법원 판례";
            if (foundList.length > 0) {
                throw { 
                    type: "API_RESTRICTED", 
                    message: "입력한 사건번호 '" + caseNum + "'와 일치하는 판결문이 API 개방 제외 대상(지방법원 하급심 또는 비공개 결정례)에 속해 있습니다.", 
                    foundList: foundList 
                };
            } else {
                throw { 
                    type: "NOT_FOUND", 
                    message: "사건번호를 법제처 DB에서 찾을 수 없습니다. (사건번호 형식 기입 오류 가능성)" 
                };
            }
        }

        var detailUrl = "https://www.law.go.kr/DRF/lawService.do?OC=" + OC + "&target=" + targetType + "&ID=" + precSeq + "&type=XML";
        var detailResponse = await fetchWithFallback(detailUrl, caseNum);
        
        var detailBuffer = await detailResponse.arrayBuffer();
        var detailText = utf8Decoder.decode(detailBuffer);
        
        if (!detailText.includes("법원명") && !detailText.includes("기관명") && !detailText.includes("사건번호")) {
            var eucKrDecoder = new TextDecoder('euc-kr');
            detailText = eucKrDecoder.decode(detailBuffer);
        }

        var courtName = getXmlTagValue(detailText, "법원명") || getXmlTagValue(detailText, "기관명") || (isDetc ? "헌법재판소" : "");
        var sentenceDate = getXmlTagValue(detailText, "선고일자") || getXmlTagValue(detailText, "결정일자") || getXmlTagValue(detailText, "선고일") || getXmlTagValue(detailText, "결정일");
        var caseNumber = getXmlTagValue(detailText, "사건번호");
        var caseName = getXmlTagValue(detailText, "사건명");

        var summary1 = cleanText(getXmlTagValue(detailText, "판시사항"));
        var summary2 = cleanText(getXmlTagValue(detailText, "결정요지") || getXmlTagValue(detailText, "판결요지"));
        
        var bodyTags = ["결정문", "전문", "판결문", "이유", "주문", "본문", "내용", "전문내용"];
        var textBody = "";
        for (var t = 0; t < bodyTags.length; t++) {
            var extractedValue = cleanText(getXmlTagValue(detailText, bodyTags[t]));
            if (extractedValue && extractedValue.length > textBody.length) {
                textBody = extractedValue;
            }
        }

        if (!textBody || textBody.length < 150) {
            var cdataRegex = /<!\[CDATA\[([\s\S]*?)\]\]>/gi;
            var cdataMatch;
            var longestCdata = "";
            while ((cdataMatch = cdataRegex.exec(detailText)) !== null) {
                var cdataContent = cleanText(cdataMatch[1]);
                if (cdataContent !== summary1 && cdataContent !== summary2 && cdataContent.length > longestCdata.length) {
                    longestCdata = cdataContent;
                }
            }
            if (longestCdata.length > textBody.length) {
                textBody = longestCdata;
            }
        }

        var verb = isDetc ? "결정" : "선고";
        var documentType = isDetc ? "결정" : "판결";
        var finalCourtHeader = courtName + " " + sentenceDate + " " + verb + " \n" + caseNumber + " " + documentType + " \n[" + caseName + "]\n";
        var finalSummary1 = summary1 ? "【판시사항】\n" + summary1 : "";
        var finalSummary2 = summary2 ? (isDetc ? "【결정요지】\n" : "【판결요지】\n") + summary2 : "";
        var finalBodyText = textBody ? textBody : (isDetc ? "【결정문 및 이유】\n(※ 본 결정례는 요약 정보만 제공되는 항목입니다.)" : "【이유】\n(※ 본 판례는 요약 정보만 제공되는 항목입니다.)");

        var compiledText = finalCourtHeader + "\n" + finalSummary1 + "\n" + finalSummary2 + "\n" + finalBodyText;
        var perfectFormattedText = formatCaseContent(compiledText);

        addLog("[" + caseNum + "] 모든 본문 데이터 결합 및 최적화 개행 완료", "success");
        return perfectFormattedText;
    }

    // [★ 무정지 배치 처리 및 스로틀링 딜레이 엔진]
    async function handleDownload(type) {
        clearLog();
        var inputData = document.getElementById('searchInput').value;
        addLog("입력 데이터 및 사건번호 패턴 정밀 분석 가동 중...");
        
        var caseList = extractCaseNumbers(inputData);
        if (caseList.length === 0) {
            addLog("⚠️ 사건번호 규격이 감지되지 않았습니다. 올바른 양식으로 작성해 주세요 (예: 2011 두 13286).", "error");
            showToast("사건번호 규격이 감지되지 않았습니다.");
            return;
        }

        addLog("판례 수집 큐(Queue) 등록 [" + caseList.length + "개]: " + caseList.join(', '));

        var collectedData = [];
        for (var i = 0; i < caseList.length; i++) {
            var caseNum = caseList[i];
            
            // [스로틀링 딜레이]: 과도한 대량 트래픽 동시 요청으로 프록시 IP 벤 및 브라우저 병목 차단
            if (i > 0) {
                await new Promise(function(resolve) { setTimeout(resolve, 250); });
            }
            
            try {
                var content = await fetchCaseTextReal(caseNum);
                collectedData.push({ title: caseNum, content: content, isError: false });
            } catch (err) {
                var errType = err.type || "NETWORK_ERROR";
                var errMsg = err.message || "서버 통신 장애 또는 프록시 네트워크 타임아웃이 발생했습니다.";
                
                addLog("❌ [" + caseNum + "] 수집 실패 원인: " + errMsg, "error");
                collectedData.push({ 
                    title: caseNum, 
                    content: errMsg, 
                    isError: true, 
                    errorType: errType,
                    errorMessage: errMsg 
                });
            }
        }

        if (type === 'txt') downloadTXT(collectedData);
        else if (type === 'pdf') await downloadPDF(collectedData);
    }

    function downloadTXT(data) {
        addLog("TXT 파일 조립 레이아웃 구성 중...");
        var output = "";
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            if (item.isError) {
                var isDetc = item.title.includes("헌");
                var webUrl = isDetc 
                    ? "https://www.law.go.kr/헌재결정례/" + encodeURIComponent(item.title)
                    : "https://www.law.go.kr/LSW/precInfoP.do?evtNo=" + encodeURIComponent(item.title);
                output += "사건번호: " + item.title + " \n";
                output += "----------------------------------------\n";
                output += "⚠️ 수집 오류: " + item.errorMessage + "\n";
                if (item.errorType === "API_RESTRICTED") {
                    output += "지방법원 하급심이거나 비공개 판례이므로 아래 국가법률정보센터 정식 주소에서 확인하세요.\n";
                } else if (item.errorType === "NOT_FOUND") {
                    output += "법제처 DB에 존재하지 않거나 오타가 있을 수 있으니 사건번호를 다시 확인하세요.\n";
                } else {
                    output += "네트워크 일시 지연 또는 대역폭 초과 장애입니다. 잠시 후 재시도해 주세요.\n";
                }
                output += "👉 해당 판결례 바로가기: " + webUrl + "\n";
            } else {
                output += item.content;
            }
            if (i < data.length - 1) output += "\n\n----------\n\n";
        }

        var blob = new Blob(["\uFEFF" + output], { type: "text/plain;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "판례모음_" + new Date().toISOString().slice(0,10) + ".txt";
        a.click();
        URL.revokeObjectURL(url);
        addLog("🎉 TXT 서식 파일 다운로드가 정상 완료되었습니다.", "success");
    }

    async function fetchFontAsBase64(url, fontName) {
        addLog(fontName + " 서체 로드 시도 중 (" + url + ")...");
        try {
            var response = await fetch(url);
            if(!response.ok) {
                addLog("⚠️ " + fontName + " 로드 실패: HTTP 상태 코드 " + response.status, "warn");
                return null;
            }
            var blob = await response.blob();
            return new Promise(function(resolve) {
                var reader = new FileReader();
                reader.onloadend = function() { resolve(reader.result.split(',')[1]); };
                reader.onerror = function() { resolve(null); };
                reader.readAsDataURL(blob);
            });
        } catch (e) {
            addLog("⚠️ " + fontName + " 연결 장애: " + e.message, "warn");
            return null;
        }
    }

    // [★ 고정 폰트 한글 매핑 완벽 복원 및 미니멀 Noto Sans KR CDN 결합]
    async function downloadPDF(data) {
        addLog("PDF 컴파일러 가동 및 한글 폰트 주입 분석 중...");
        try {
            // 로컬 Noto Sans KR 폰트 바인딩
            var fontBase64Regular = await fetchFontAsBase64("./NotoSansKR-Regular.ttf", "NotoSansKR Regular (로컬)");
            var fontBase64Bold = await fetchFontAsBase64("./NotoSansKR-Bold.ttf", "NotoSansKR Bold (로컬)");

            // 예외 방어선: 로컬 파일의 CDN 캐시 전파 지연 등을 우려한 300KB급 고속 온라인 미니민 Noto Sans KR CDN 우회 백업 탑재
            if (!fontBase64Regular) {
                addLog("⚠️ 로컬 NotoSansKR-Regular.ttf 로드 우회 처리. 예비 초고속 CDN 복원망을 구동합니다.", "warn");
                fontBase64Regular = await fetchFontAsBase64("https://cdn.jsdelivr.net/gh/sunnypark/noto-sans-kr-minify@master/fonts/NotoSansKR-Regular.ttf", "NotoSansKR Regular (CDN 예비)");
            }
            if (!fontBase64Bold) {
                addLog("⚠️ 로컬 NotoSansKR-Bold.ttf 로드 우회 처리. 예비 초고속 CDN 복원망을 구동합니다.", "warn");
                fontBase64Bold = await fetchFontAsBase64("https://cdn.jsdelivr.net/gh/sunnypark/noto-sans-kr-minify@master/fonts/NotoSansKR-Bold.ttf", "NotoSansKR Bold (CDN 예비)");
            }

            var jsPDF = window.jspdf.jsPDF;
            var doc = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });

            if (fontBase64Regular) {
                doc.addFileToVFS("NotoSansKR-Regular.ttf", fontBase64Regular);
                doc.addFont("NotoSansKR-Regular.ttf", "NotoSansKR", "normal");
            }
            if (fontBase64Bold) {
                doc.addFileToVFS("NotoSansKR-Bold.ttf", fontBase64Bold);
                doc.addFont("NotoSansKR-Bold.ttf", "NotoSansKR", "bold");
            }

            if (fontBase64Regular || fontBase64Bold) {
                doc.setFont("NotoSansKR", "normal");
                addLog("한국어 전용 Noto Sans KR 고가독성 서체 결합 완료.", "success");
            } else {
                addLog("⚠️ 서체 로드 최종 실패로 시스템 기본 폰트로 대체 구동합니다.", "warn");
            }

            var margin = 10;
            var pageWidth = 210;
            var pageHeight = 297;
            var printWidth = pageWidth - (margin * 2);
            var bottomLimit = pageHeight - margin;

            var fontSizeTitle = 15;
            var fontSizeBody = 11;
            
            var lineHeightTitle = fontSizeTitle * 0.3528 * 2.0;
            var lineHeightBody = fontSizeBody * 0.3528 * 2.0;

            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                if (i > 0) doc.addPage();

                // [★ 에러 유형별 맞춤형 우회 리포트 한 페이지 렌더링 설계]
                if (item.isError) {
                    addLog("[" + item.title + "] PDF 에러 페이지 레이아웃 배치 중...");
                    var currentY = margin + 10;

                    if (fontBase64Bold) doc.setFont("NotoSansKR", "bold");
                    doc.setFontSize(fontSizeTitle);
                    doc.setTextColor(220, 53, 69);
                    doc.text("판례 수집 실패 보고서", margin, currentY);
                    currentY += lineHeightTitle + 6;

                    if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                    doc.setFontSize(fontSizeBody);
                    doc.setTextColor(32, 33, 36);
                    doc.text("대상 사건번호: " + item.title, margin, currentY);
                    currentY += lineHeightBody + 8;

                    // 오류 원인 가시적 격리 텍스트
                    doc.setTextColor(108, 117, 125);
                    var detailDesc = "";
                    if (item.errorType === "API_RESTRICTED") {
                        detailDesc = "해당 판례는 존재하나, 법제처 Open API 의 데이터 제공 제외 범위인 '지방법원 하급심' 또는 '공개 거부된 결정례'에 속해 있습니다.";
                    } else if (item.errorType === "NOT_FOUND") {
                        detailDesc = "해당 사건번호가 법제처 데이터베이스에 존재하지 않거나 오타가 있습니다. 대법원 나의사건검색 등에서 사건번호 형식을 다시 확인해 주세요.";
                    } else if (item.errorType === "KEY_ERROR") {
                        detailDesc = "사용 중인 법제처 API 인증키(oc)가 만료되었거나 비활성 상태입니다. 국가법령정보센터에서 신규 키를 발급받아 교체해 주세요.";
                    } else {
                        detailDesc = "대용량 동시 수집 중 CORS 우회망 프록시 또는 법제처 서버의 대역폭 한계로 일시적인 타임아웃 정체가 발생했습니다.";
                    }
                    
                    var descLines = doc.splitTextToSize(detailDesc + " 수집을 우회하여 국가법률정보센터 정식 웹 뷰어에서 직접 읽을 수 있는 공식 하이퍼링크를 아래에 제공합니다.", printWidth);
                    for (var k = 0; k < descLines.length; k++) {
                        doc.text(descLines[k], margin, currentY);
                        currentY += lineHeightBody;
                    }
                    currentY += 8;

                    if (fontBase64Bold) doc.setFont("NotoSansKR", "bold");
                    doc.setTextColor(26, 115, 232);
                    
                    var isDetc = item.title.includes("헌");
                    var webUrl = isDetc 
                        ? "https://www.law.go.kr/헌재결정례/" + encodeURIComponent(item.title)
                        : "https://www.law.go.kr/LSW/precInfoP.do?evtNo=" + encodeURIComponent(item.title);
                    doc.text("👉 [클릭] 국가법률정보센터에서 판결문 직접 보기", margin, currentY);
                    
                    doc.link(margin, currentY - 4, 120, 8, { url: webUrl });
                    doc.setTextColor(32, 33, 36);
                    continue;
                }

                addLog("[" + item.title + "] 고급 독해용 레이아웃 구성 및 도면 드로잉 중...");
                var currentY = margin + 5;

                // 타이틀 출력
                if (fontBase64Bold) doc.setFont("NotoSansKR", "bold");
                doc.setFontSize(fontSizeTitle);
                doc.text(item.title, margin, currentY);
                currentY += lineHeightTitle + 4;

                if (fontBase64Regular) doc.setFont("NotoSansKR", "normal");
                doc.setFontSize(fontSizeBody);
                
                var paragraphs = item.content.split('\n');

                for (var j = 0; j < paragraphs.length; j++) {
                    var para = paragraphs[j];
                    if (para.trim() === "") {
                        currentY += lineHeightBody;
                        continue;
                    }

                    // [★ 엄격한 소목차 및 법관 연판장 전용 Bold 판정식]
                    // 본문 중간의 불필요한 대괄호 기호들이 Bold로 난발되지 않도록 엄밀하게 필터링 제어
                    var isHeader = false;
                    var trimmed = para.trim();
                    if (trimmed.startsWith("【") && trimmed.endsWith("】")) {
                        isHeader = true; // 【판시사항】, 【판결요지】 등 최상위 카테고리 헤더만 해당
                    } else if (trimmed.match(/^\[\d+\]/)) {
                        isHeader = true; // [1], [2] 와 같이 확실한 순수 요지/판결 요약 대목차 기호만 해당
                    } else if (trimmed.match(/^\d+\.\s+(상고이유|먼저)/)) {
                        isHeader = true; // 본문 중 상고이유 1. 2. 등의 대목차 구획만 해당
                    } else if (trimmed.match(/^(대법관|대법원장)\s+[가-힣]/)) {
                        isHeader = true; // 결미 서명부
                    }

                    if (isHeader && fontBase64Bold) {
                        doc.setFont("NotoSansKR", "bold");
                    } else if (fontBase64Regular) {
                        doc.setFont("NotoSansKR", "normal");
                    }

                    var lines = doc.splitTextToSize(para, printWidth);
                    for (var k = 0; k < lines.length; k++) {
                        if (currentY > bottomLimit) {
                            doc.addPage();
                            currentY = margin + 10;
                        }
                        doc.text(lines[k], margin, currentY);
                        currentY += lineHeightBody;
                    }
                    currentY += lineHeightBody;
                }
            }

            addLog("바이너리 마감 스트림 스트리밍 배출 중...");
            doc.save("판례모음_" + new Date().toISOString().slice(0,10) + ".pdf");
            showToast("가독성이 극대화된 PDF 판례집 다운로드가 완료되었습니다!");
        } catch (error) {
            addLog("❌ PDF 최종 결합 치명적 실패: " + error.message, 'error');
        }
    }
</script>
